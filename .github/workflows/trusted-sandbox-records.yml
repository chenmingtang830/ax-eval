name: Trusted sandbox production records

on:
  workflow_dispatch:
    inputs:
      vendor:
        description: DAEB vendor to execute
        required: true
        type: choice
        options:
          - neon
          - cockroachdb
          - turso
          - supabase
          - insforge
          - nile
      surface:
        description: Surface to execute
        required: true
        type: choice
        options:
          - api
          - cli
      baseline_run_id:
        description: Prior trusted workflow run ID (blank bootstraps a zero-delta diff)
        required: false
        type: string
      pr_number:
        description: Optional same-repository PR number to update
        required: false
        type: string
      source_ref:
        description: Reviewed ref to execute
        required: true
        default: main
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: trusted-sandbox-${{ inputs.vendor }}-${{ inputs.surface }}
  cancel-in-progress: false

jobs:
  production:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    # Repository settings must configure required reviewers on this environment.
    environment: trusted-sandbox
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run canonical three-trial production cell
        env:
          VENDOR: ${{ inputs.vendor }}
          SURFACE: ${{ inputs.surface }}
          RUN_ROOT: results/runs/trusted-${{ github.run_id }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_BRANCH_ID: ${{ secrets.NEON_BRANCH_ID }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          COCKROACH_API_KEY: ${{ secrets.COCKROACH_API_KEY }}
          COCKROACH_CONNECTION_STRING: ${{ secrets.COCKROACH_CONNECTION_STRING }}
          TURSO_DATABASE_AUTH_TOKEN: ${{ secrets.TURSO_DATABASE_AUTH_TOKEN }}
          TURSO_ORG_API_TOKEN: ${{ secrets.TURSO_ORG_API_TOKEN }}
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
          TURSO_SANDBOX_DATABASE: ${{ secrets.TURSO_SANDBOX_DATABASE }}
          TURSO_ORG: ${{ secrets.TURSO_ORG }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          INSFORGE_PROJECT_URL: ${{ secrets.INSFORGE_PROJECT_URL }}
          INSFORGE_API_KEY: ${{ secrets.INSFORGE_API_KEY }}
          INSFORGE_CONNECTION_STRING: ${{ secrets.INSFORGE_CONNECTION_STRING }}
          NILE_API_KEY: ${{ secrets.NILE_API_KEY }}
          NILE_WORKSPACE: ${{ secrets.NILE_WORKSPACE }}
          NILE_DB: ${{ secrets.NILE_DB }}
          NILE_DATABASE_URL: ${{ secrets.NILE_DATABASE_URL }}
        run: npm run ax-eval -- daeb-production-rerun --suite ax-arena/benchmark/daeb/v1/suite.yaml --vendor "$VENDOR" --surface "$SURFACE" --run-dir "$RUN_ROOT"

      - name: Prepare baseline records
        id: baseline
        env:
          BASELINE_RUN_ID: ${{ inputs.baseline_run_id }}
          GH_TOKEN: ${{ github.token }}
          RUN_ROOT: results/runs/trusted-${{ github.run_id }}
        run: |
          if [ -n "$BASELINE_RUN_ID" ]; then
            mkdir -p /tmp/baseline-records
            gh run download "$BASELINE_RUN_ID" --repo "$GITHUB_REPOSITORY" --name normalized-records --dir /tmp/baseline-records
            echo "path=/tmp/baseline-records" >> "$GITHUB_OUTPUT"
          else
            echo "No baseline run supplied; comparing this bootstrap run to itself."
            echo "path=$RUN_ROOT" >> "$GITHUB_OUTPUT"
          fi

      - name: Render normalized records diff
        env:
          BASE_RECORDS: ${{ steps.baseline.outputs.path }}
          RUN_ROOT: results/runs/trusted-${{ github.run_id }}
        run: npm run ax-eval -- records-diff --base "$BASE_RECORDS" --head "$RUN_ROOT" --out records-diff.md

      - name: Add diff to job summary
        run: cat records-diff.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload normalized records and cleanup evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: normalized-records
          if-no-files-found: warn
          path: |
            records-diff.md
            results/runs/trusted-${{ github.run_id }}/**/*.normalized.json
            results/runs/trusted-${{ github.run_id }}/**/cleanup.json
            results/runs/trusted-${{ github.run_id }}/**/*manifest.json

      - name: Update requested PR comment
        if: success() && inputs.pr_number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const fs = require("fs");
            const issue_number = Number(process.env.PR_NUMBER);
            if (!Number.isSafeInteger(issue_number) || issue_number <= 0) {
              core.setFailed("pr_number must be a positive integer");
              return;
            }
            const marker = "<!-- ax-eval-trusted-sandbox-records -->";
            const body = `${marker}\nTrusted sandbox run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n${fs.readFileSync("records-diff.md", "utf8")}`;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const prior = comments.find((comment) => comment.user?.type === "Bot" && comment.body?.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
