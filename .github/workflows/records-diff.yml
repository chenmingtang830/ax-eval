name: Normalized records fixture diff

on:
  pull_request:

permissions:
  contents: read

jobs:
  diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare the base fixture
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node .github/prepare-record-fixture.mjs "$BASE_REF" tests/fixtures/normalized-records/current /tmp/base-records

      - name: Render normalized records diff
        run: npm run ax-eval -- records-diff --base /tmp/base-records --head tests/fixtures/normalized-records/current --out records-diff.md

      - name: Add diff to job summary
        run: cat records-diff.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diff artifact
        uses: actions/upload-artifact@v4
        with:
          name: normalized-records-fixture-diff
          path: records-diff.md

  comment:
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs: diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download diff artifact
        uses: actions/download-artifact@v4
        with:
          name: normalized-records-fixture-diff

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- ax-eval-normalized-records-diff -->";
            const body = `${marker}\n${fs.readFileSync("records-diff.md", "utf8")}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const prior = comments.find((comment) => comment.user?.type === "Bot" && comment.body?.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
