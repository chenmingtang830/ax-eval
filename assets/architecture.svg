<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ax-eval architecture</title>
  <desc id="desc">A reviewed task pack runs across API, CLI, SDK, and MCP surfaces and across agent harnesses; live read-back verification produces reports and normalized records.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .title { font-size: 34px; font-weight: 800; fill: #0f172a; }
      .sub { font-size: 15px; fill: #475569; }
      .label { font-size: 12px; font-weight: 800; fill: #475569; text-transform: uppercase; }
      .h { font-size: 18px; font-weight: 800; fill: #0f172a; }
      .t { font-size: 13px; fill: #475569; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; fill: #64748b; }
      .card { stroke-width: 1.4; rx: 10; ry: 10; }
      .edge { stroke: #334155; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #cbd5e1; stroke-width: 1.3; fill: none; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="34" y="34" width="1212" height="692" rx="18" fill="#ffffff" stroke="#e2e8f0"/>

  <text x="72" y="88" class="title">ax-eval: verified agent operability</text>
  <text x="72" y="118" class="sub">One reviewed task pack runs across product surfaces and agent harnesses, then live state decides the score.</text>

  <rect x="72" y="160" width="220" height="126" class="card" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="96" y="192" class="label">Input</text>
  <text x="96" y="226" class="h">Product contract</text>
  <text x="96" y="252" class="t">OpenAPI, GraphQL, docs,</text>
  <text x="96" y="272" class="t">auth, sandbox scope</text>

  <rect x="354" y="160" width="220" height="126" class="card" fill="#eef2ff" stroke="#818cf8"/>
  <text x="378" y="192" class="label">Generate</text>
  <text x="378" y="226" class="h">Task pack</text>
  <text x="378" y="252" class="t">L1-L4 tasks, discovery,</text>
  <text x="378" y="272" class="t">round-trip oracles</text>

  <rect x="636" y="160" width="220" height="126" class="card" fill="#fefce8" stroke="#eab308"/>
  <text x="660" y="192" class="label">Review gate</text>
  <text x="660" y="226" class="h">Human-approved</text>
  <text x="660" y="252" class="t">Hash-locked pack with</text>
  <text x="660" y="272" class="t">Pack QA warnings</text>

  <path d="M292 223 H338" class="edge"/>
  <path d="M574 223 H620" class="edge"/>

  <rect x="82" y="372" width="488" height="188" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="110" y="406" class="label">Product surfaces</text>
  <text x="110" y="436" class="h">Same goal, different way to act</text>

  <rect x="112" y="468" width="92" height="54" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="138" y="501" class="h">API</text>
  <rect x="226" y="468" width="92" height="54" rx="8" fill="#dcfce7" stroke="#4ade80"/>
  <text x="252" y="501" class="h">CLI</text>
  <rect x="340" y="468" width="92" height="54" rx="8" fill="#fae8ff" stroke="#d946ef"/>
  <text x="365" y="501" class="h">SDK</text>
  <rect x="454" y="468" width="92" height="54" rx="8" fill="#ffedd5" stroke="#fb923c"/>
  <text x="477" y="501" class="h">MCP</text>

  <rect x="710" y="372" width="286" height="188" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="738" y="406" class="label">Agent harnesses</text>
  <text x="738" y="436" class="h">Run the matrix</text>
  <text x="738" y="472" class="t">claude-code</text>
  <text x="738" y="500" class="t">codex</text>
  <text x="738" y="528" class="mono">low / high effort · attempts</text>

  <path d="M746 286 V330 Q746 348 728 348 H326 Q326 348 326 372" class="edge"/>
  <path d="M570 466 H694" class="edge"/>

  <rect x="1036" y="372" width="160" height="188" rx="12" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="1064" y="406" class="label">Verify</text>
  <text x="1064" y="436" class="h">Read back</text>
  <text x="1064" y="468" class="t">Live product</text>
  <text x="1064" y="492" class="t">state decides</text>
  <text x="1064" y="516" class="t">pass/fail</text>

  <path d="M996 466 H1020" class="edge"/>

  <rect x="72" y="624" width="1124" height="66" rx="12" fill="#0f172a"/>
  <text x="104" y="650" fill="#cbd5e1" font-size="13" font-weight="800">Output</text>
  <text x="104" y="675" fill="#f8fafc" font-size="21" font-weight="800">HTML report · normalized records · trace-backed recommendations · competitive comparison</text>
  <text x="910" y="675" fill="#cbd5e1" font-size="13">No self-report scoring.</text>

  <path d="M1116 560 V594 Q1116 612 1098 612 H634 Q634 612 634 624" class="edge"/>
</svg>
