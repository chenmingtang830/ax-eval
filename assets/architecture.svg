<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ax-eval architecture</title>
  <desc id="desc">Pipeline from OpenAPI or GraphQL spec to reviewed task pack, host-agent execution, verifier, and HTML report.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 34px; font-weight: 800; fill: #0f172a; letter-spacing: -0.04em; }
      .sub { font-size: 15px; fill: #475569; }
      .label { font-size: 13px; font-weight: 800; fill: #0f172a; letter-spacing: 0.06em; text-transform: uppercase; }
      .h { font-size: 18px; font-weight: 800; fill: #0f172a; }
      .t { font-size: 13px; fill: #475569; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; fill: #64748b; }
      .card { rx: 20; ry: 20; stroke-width: 1.5; }
      .edge { stroke: #334155; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .muted-edge { stroke: #cbd5e1; stroke-width: 1.5; fill: none; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#hero)"/>
  <rect x="32" y="32" width="1216" height="696" rx="30" fill="#ffffff" stroke="#e2e8f0"/>

  <text x="72" y="92" class="title">ax-eval: from published surface to verified agent success</text>
  <text x="72" y="124" class="sub">Generate tasks from a product spec, run them through the host agent, verify live sandbox state, and report the gap.</text>

  <rect x="72" y="164" width="240" height="124" class="card" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="96" y="198" class="label">Input</text>
  <text x="96" y="232" class="h">Product surface</text>
  <text x="96" y="258" class="t">OpenAPI or GraphQL</text>
  <text x="96" y="278" class="mono">docs - auth - sandbox</text>

  <rect x="372" y="164" width="240" height="124" class="card" fill="#eef2ff" stroke="#818cf8"/>
  <text x="396" y="198" class="label">1. Ingest</text>
  <text x="396" y="232" class="h">Parse capabilities</text>
  <text x="396" y="258" class="t">Resources, auth hints,</text>
  <text x="396" y="278" class="t">create/read pairs</text>

  <rect x="672" y="164" width="240" height="124" class="card" fill="#ecfeff" stroke="#22d3ee"/>
  <text x="696" y="198" class="label">2. Generate</text>
  <text x="696" y="232" class="h">Frozen task pack</text>
  <text x="696" y="258" class="t">L1-L4 tasks, discovery,</text>
  <text x="696" y="278" class="t">round-trip oracles</text>

  <rect x="972" y="164" width="204" height="124" class="card" fill="#fefce8" stroke="#facc15"/>
  <text x="996" y="198" class="label">3. Review</text>
  <text x="996" y="232" class="h">Human gate</text>
  <text x="996" y="258" class="t">Approve executable</text>
  <text x="996" y="278" class="t">tasks before run</text>

  <path d="M312 226 H356" class="edge"/>
  <path d="M612 226 H656" class="edge"/>
  <path d="M912 226 H956" class="edge"/>

  <rect x="72" y="378" width="280" height="168" class="card" fill="#f0f9ff" stroke="#38bdf8"/>
  <text x="96" y="412" class="label">4. Execute</text>
  <text x="96" y="446" class="h">Host-agent run</text>
  <text x="96" y="474" class="t">The agent starts cold:</text>
  <text x="96" y="498" class="t">discover docs/API, act through</text>
  <text x="96" y="522" class="t">API, CLI, SDK, or MCP surface.</text>

  <rect x="428" y="378" width="280" height="168" class="card" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="452" y="412" class="label">5. Verify</text>
  <text x="452" y="446" class="h">Read back real state</text>
  <text x="452" y="474" class="t">Programmatic oracle checks</text>
  <text x="452" y="498" class="t">the product, not the agent's</text>
  <text x="452" y="522" class="t">self-report.</text>

  <rect x="784" y="378" width="392" height="168" class="card" fill="#fff7ed" stroke="#fb923c"/>
  <text x="808" y="412" class="label">6. Report</text>
  <text x="808" y="446" class="h">HTML + normalized result</text>
  <text x="808" y="474" class="t">Pass@k, discovery score, spec smells, trace diffs,</text>
  <text x="808" y="498" class="t">blocked surfaces, and recommendations.</text>
  <text x="808" y="522" class="mono">static readiness x behavioral success</text>

  <path d="M1074 288 V326 Q1074 346 1054 346 H212 Q192 346 192 366 V378" class="edge"/>
  <path d="M352 462 H412" class="edge"/>
  <path d="M708 462 H768" class="edge"/>

  <line x1="212" y1="566" x2="212" y2="616" class="muted-edge"/>
  <line x1="568" y1="566" x2="568" y2="616" class="muted-edge"/>
  <line x1="980" y1="566" x2="980" y2="616" class="muted-edge"/>

  <rect x="72" y="616" width="1104" height="72" rx="18" fill="#0f172a"/>
  <text x="104" y="648" fill="#e2e8f0" font-size="15" font-weight="700">Value proposition</text>
  <text x="104" y="674" fill="#f8fafc" font-size="22" font-weight="800" letter-spacing="-0.03em">Being published is not the same as being usable by agents.</text>
  <text x="820" y="674" fill="#cbd5e1" font-size="14">ax-eval makes that gap visible and actionable.</text>
</svg>
