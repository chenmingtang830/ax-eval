<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="860" viewBox="0 0 1120 860" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#15803d"/>
    </marker>
  </defs>

  <style>
    .title  { font-size: 24px; font-weight: 700; fill: #0f172a; }
    .sub    { font-size: 13px; fill: #64748b; }
    .box    { rx: 10; ry: 10; stroke-width: 1.5; }
    .h      { font-size: 15px; font-weight: 700; }
    .t      { font-size: 12px; fill: #334155; }
    .path   { font-size: 11px; fill: #64748b; font-family: ui-monospace, Menlo, monospace; }
    .band   { font-size: 13px; font-weight: 700; letter-spacing: .5px; }
    .edge   { stroke: #475569; stroke-width: 1.6; fill: none; }
    .edgeG  { stroke: #15803d; stroke-width: 2; fill: none; }
  </style>

  <!-- Header -->
  <text x="40" y="42" class="title">AX eval — architecture &amp; execution flow</text>
  <text x="40" y="64" class="sub">"Integration test for Agent Experience": run real tasks against a SaaS target across harnesses + audit its agent-readiness, then show the gap.</text>

  <!-- ============ CLI ENTRY ============ -->
  <rect x="40" y="90" width="1040" height="74" class="box" fill="#eef2ff" stroke="#6366f1"/>
  <text x="60" y="116" class="h" fill="#3730a3">CLI entry — <tspan font-family="ui-monospace, monospace" font-size="13px">ax-eval</tspan>  (src/cli.ts)</text>
  <rect x="62" y="126" width="150" height="28" rx="6" fill="#fff" stroke="#a5b4fc"/>
  <text x="137" y="145" class="t" text-anchor="middle" font-weight="700">run</text>
  <rect x="224" y="126" width="150" height="28" rx="6" fill="#fff" stroke="#a5b4fc"/>
  <text x="299" y="145" class="t" text-anchor="middle" font-weight="700">audit</text>
  <rect x="386" y="126" width="150" height="28" rx="6" fill="#fff" stroke="#a5b4fc"/>
  <text x="461" y="145" class="t" text-anchor="middle" font-weight="700">report</text>
  <rect x="548" y="126" width="180" height="28" rx="6" fill="#fff" stroke="#a5b4fc"/>
  <text x="638" y="145" class="t" text-anchor="middle" font-weight="700">list-harnesses</text>
  <text x="930" y="145" class="path" text-anchor="middle">--offline · --site · --pack</text>

  <!-- ============ CONFIG ============ -->
  <rect x="40" y="186" width="1040" height="64" class="box" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="60" y="210" class="h" fill="#334155">Config / load  (src/config.ts, src/schemas.ts)</text>
  <text x="60" y="232" class="t">loadDotenv(.env) → process.env   ·   loadPack(pack.yaml) → zod-validated TargetPack (tasks + oracles + site_url)</text>

  <!-- arrow CLI -> config -->
  <line x1="560" y1="164" x2="560" y2="186" class="edge" marker-end="url(#arrow)"/>

  <!-- band labels -->
  <text x="60" y="288" class="band" fill="#0e7490">① BEHAVIORAL EVAL  — can an agent actually do the job?</text>
  <text x="600" y="288" class="band" fill="#b45309">② STATIC EVAL (AEO)  — is the plumbing even exposed?</text>

  <!-- divider -->
  <line x1="565" y1="300" x2="565" y2="660" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ===== BEHAVIORAL COLUMN (left) ===== -->
  <!-- Pack -->
  <rect x="60" y="300" width="470" height="56" class="box" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="76" y="322" class="h" fill="#155e75">TargetPack — 8 Asana tasks + oracles</text>
  <text x="76" y="342" class="path">targets/asana/pack.yaml</text>

  <!-- Runner -->
  <rect x="60" y="378" width="470" height="56" class="box" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="76" y="400" class="h" fill="#155e75">Runner — N tasks × M harnesses</text>
  <text x="76" y="420" class="path">src/runner.ts  → matrix(), passRate()</text>

  <!-- Harnesses -->
  <rect x="60" y="456" width="470" height="74" class="box" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="76" y="478" class="h" fill="#155e75">Harness adapters → world-state + trace</text>
  <text x="76" y="497" class="path">src/adapters/  (base · registry)</text>
  <rect x="76" y="503" width="120" height="20" rx="5" fill="#fff" stroke="#67e8f9"/>
  <text x="136" y="517" class="t" text-anchor="middle" font-size="11px">mock (synthetic)</text>
  <rect x="204" y="503" width="92" height="20" rx="5" fill="#fff" stroke="#67e8f9"/>
  <text x="250" y="517" class="t" text-anchor="middle" font-size="11px">mock-weak</text>
  <rect x="304" y="503" width="150" height="20" rx="5" fill="#fff" stroke="#67e8f9"/>
  <text x="379" y="517" class="t" text-anchor="middle" font-size="11px">hermes (keyless stub)</text>

  <!-- Oracles -->
  <rect x="60" y="552" width="470" height="62" class="box" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="76" y="574" class="h" fill="#155e75">Oracles score the world → RunResult</text>
  <text x="76" y="594" class="path">src/oracles.ts  ·  exists / equals / contains</text>

  <!-- arrows behavioral -->
  <line x1="295" y1="356" x2="295" y2="378" class="edge" marker-end="url(#arrow)"/>
  <line x1="295" y1="434" x2="295" y2="456" class="edge" marker-end="url(#arrow)"/>
  <line x1="295" y1="530" x2="295" y2="552" class="edge" marker-end="url(#arrow)"/>

  <!-- future adapters note -->
  <text x="76" y="640" class="sub" font-size="11px" font-style="italic">M1+: real claude-code / codex / minimal adapters slot into the same registry</text>

  <!-- ===== STATIC COLUMN (right) ===== -->
  <rect x="600" y="300" width="480" height="56" class="box" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="616" y="322" class="h" fill="#92400e">site_url (from pack)  e.g. https://asana.com</text>
  <text x="616" y="342" class="path">targets/asana/pack.yaml → site_url</text>

  <rect x="600" y="378" width="480" height="56" class="box" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="616" y="400" class="h" fill="#92400e">Fetcher — live HTTP, fixture fallback</text>
  <text x="616" y="420" class="path">src/static/fetcher.ts  ·  --offline → fixtures/</text>

  <rect x="600" y="456" width="480" height="74" class="box" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="616" y="478" class="h" fill="#92400e">8 readiness checks → pass / fail / error</text>
  <text x="616" y="497" class="path">src/static/checks.ts</text>
  <text x="616" y="519" class="t" font-size="11px">llms.txt · AGENTS.md · OpenAPI · MCP · SDK · robots/sitemap · OAuth</text>

  <rect x="600" y="552" width="480" height="62" class="box" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="616" y="574" class="h" fill="#92400e">Audit — weighted 0–100 readiness score</text>
  <text x="616" y="594" class="path">src/static/audit.ts  ·  errored checks excluded</text>

  <!-- arrows static -->
  <line x1="840" y1="356" x2="840" y2="378" class="edge" marker-end="url(#arrow)"/>
  <line x1="840" y1="434" x2="840" y2="456" class="edge" marker-end="url(#arrow)"/>
  <line x1="840" y1="530" x2="840" y2="552" class="edge" marker-end="url(#arrow)"/>

  <!-- ===== MERGE: REPORT + GAP ===== -->
  <!-- converging arrows -->
  <path d="M295,614 L295,672 Q295,688 311,688 L520,688" class="edgeG" marker-end="url(#arrowGreen)"/>
  <path d="M840,614 L840,672 Q840,688 824,688 L610,688" class="edgeG" marker-end="url(#arrowGreen)"/>

  <rect x="240" y="700" width="640" height="86" class="box" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="560" y="724" class="h" fill="#166534" text-anchor="middle">Reporting — matrix + pass rate  +  THE GAP</text>
  <text x="560" y="744" class="path" text-anchor="middle">src/reporting.ts  ·  src/static/render.ts</text>
  <text x="560" y="766" class="t" text-anchor="middle">"Readiness 75/100, but best real agent only 40% → exposed ≠ usable"</text>
  <text x="560" y="780" class="sub" text-anchor="middle" font-size="11px">synthetic controls excluded · "not run" ≠ "failed" · errored ≠ absent</text>

  <!-- storage -->
  <rect x="916" y="700" width="164" height="86" class="box" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="998" y="730" class="h" fill="#334155" text-anchor="middle" font-size="14px">Storage</text>
  <text x="998" y="750" class="path" text-anchor="middle">src/storage.ts</text>
  <text x="998" y="768" class="t" text-anchor="middle" font-size="11px">results/</text>
  <text x="998" y="782" class="t" text-anchor="middle" font-size="11px">last-run.json</text>

  <line x1="880" y1="743" x2="916" y2="743" class="edgeG" marker-end="url(#arrowGreen)"/>

  <!-- command routing legend -->
  <text x="40" y="826" class="sub" font-size="12px">
    <tspan font-weight="700" fill="#3730a3">run</tspan> = ① + ② + gap   ·
    <tspan font-weight="700" fill="#3730a3"> audit</tspan> = ② only   ·
    <tspan font-weight="700" fill="#3730a3"> report</tspan> = re-render saved JSON   ·
    <tspan font-weight="700" fill="#3730a3"> list-harnesses</tspan> = registry   ·   all run keyless (no API keys)
  </text>
</svg>
