# Database AX Benchmark V1 (DAEB-1) — Canonical Task Suite
#
# This file is the source of truth for what every vendor pack in DAEB-1 is
# evaluated on. It is consumed by `ax-eval generate --suite docs/daeb-1-suite.yaml`
# to constrain the LLM-assisted generator to produce per-vendor packs with
# IDENTICAL task ids and aligned intent. The vendor pack's per-task `prompt`,
# `oracles[].readPathTemplate`, and surface specifics are vendor-authored;
# task `id`, `title`, and `difficulty` MUST match this suite exactly.
#
# Methodology rules:
#   - Score comparability across vendors is established by shared task `id`.
#   - A task that is structurally N/A for a vendor (e.g., Convex has no SQL DDL)
#     MUST still appear in the pack with `allowed_surfaces: []` so the
#     competitive report records it as N/A, not silently absent.
#   - Public methodology page (axarena.ai/methodology) renders this file
#     verbatim plus per-vendor N/A disclosures.

name: DAEB-1
version: 1
category: database
description: |
  Canonical task suite for Database Agent Experience Benchmark V1.
  Ten tasks covering schema management, data ops, access control,
  relational integrity, export, migration, runtime integration, and ops.
  Each task is goal-level: prompts never name endpoints, methods, or SDK
  calls — discovery is part of the test.
homepage: https://axarena.ai/methodology/daeb-1

tasks:
  - id: db-T01-create-table
    title: "T01: create a table"
    difficulty: L1
    skill: schema-ddl
    intent: |
      Create a new table named `axarena_customers_{ns}` with the columns:
      id (primary key, uuid or autoincrement int — vendor's idiomatic choice),
      email (text/varchar, unique), and created_at (timestamp with default
      now()). The vendor's idiomatic schema definition mechanism is acceptable
      (SQL DDL, schema-as-code, dashboard-equivalent API). Report the table or
      collection identifier.
    oracle_hint: |
      Read back the table list / schema introspection; assert
      `axarena_customers_{ns}` exists with the three named columns.
    allowed_surfaces: [api, sdk, cli, mcp]
    na_examples: []

  - id: db-T02-insert-rows
    title: "T02: bulk-insert rows"
    difficulty: L1
    skill: bulk-write
    intent: |
      Insert exactly 100 rows into `axarena_customers_{ns}`, each with a
      unique email of the form `probe-<n>@axarena-{ns}.test` for n in 1..100
      and a deterministic created_at. The vendor's idiomatic bulk-insert
      mechanism is acceptable.
    oracle_hint: |
      Count rows in `axarena_customers_{ns}`; assert exactly 100. Sample a
      row by email and assert the expected shape.
    allowed_surfaces: [api, sdk, cli, mcp]
    na_examples: []

  - id: db-T03-query-pattern
    title: "T03: pattern query with pagination"
    difficulty: L2
    skill: filtered-read
    intent: |
      From `axarena_customers_{ns}`, return all rows where email matches the
      pattern `probe-1%@axarena-{ns}.test` (i.e., starts with `probe-1`),
      ordered by created_at, paginated at 5 rows per page. Return the first
      two pages.
    oracle_hint: |
      Re-execute the query through the vendor's standard API; assert exactly
      11 matching rows (probe-1, probe-10..probe-19), and that the agent's
      reported page 1 contains the lowest-ordered 5 emails.
    allowed_surfaces: [api, sdk, cli, mcp]
    na_examples: []

  - id: db-T04-rls-policy
    title: "T04: row-level access control"
    difficulty: L3
    skill: access-control
    intent: |
      Configure row-level access control so that each user can only read rows
      from `axarena_customers_{ns}` where the row's owner matches the
      authenticated user. The vendor's idiomatic mechanism — Postgres RLS,
      attribute-based policy, query-rewrite middleware, function-level guard
      — is acceptable.
    oracle_hint: |
      Authenticate as two distinct users; assert each sees only their own
      rows, neither sees the other's, and the count is correct per user.
    allowed_surfaces: [api, sdk, cli, mcp]
    na_examples:
      - "Vendor has no per-row access model; document and mark N/A."

  - id: db-T05-unique-constraint
    title: "T05: unique constraint enforcement"
    difficulty: L1
    skill: constraint-enforcement
    intent: |
      Verify (or add, if missing) a unique constraint on `email` in
      `axarena_customers_{ns}`. Attempt to insert a row with an email that
      already exists. The insert must fail.
    oracle_hint: |
      After the attempted duplicate insert, count rows with the duplicate
      email; assert exactly 1. Inspect the agent's reported error and assert
      a recognizable unique-violation error code or message.
    allowed_surfaces: [api, sdk, cli, mcp]
    na_examples: []

  - id: db-T06-foreign-key
    title: "T06: relational integrity (foreign key)"
    difficulty: L2
    skill: relational-integrity
    intent: |
      Create a second table `axarena_orders_{ns}` with columns id (pk),
      customer_id (referencing `axarena_customers_{ns}.id`), and amount
      (numeric). Establish the foreign-key relationship using the vendor's
      idiomatic mechanism. Insert one order referring to an existing customer.
    oracle_hint: |
      Attempt to insert an order with a customer_id that doesn't exist;
      assert that the insert fails with a recognizable foreign-key
      violation. Read back the valid order; assert the relationship holds.
    allowed_surfaces: [api, sdk, cli, mcp]
    na_examples:
      - "Vendor is schemaless / has no foreign-key model; document and mark N/A."

  - id: db-T07-export
    title: "T07: export table contents"
    difficulty: L1
    skill: data-export
    intent: |
      Export the contents of `axarena_customers_{ns}` as JSON or CSV. Report
      the output path (file) or stream.
    oracle_hint: |
      Parse the export; assert exactly 100 records and that each record has
      the expected fields. If file path: read the file. If stream: capture
      bytes from the agent's reported handle.
    allowed_surfaces: [api, sdk, cli, mcp]
    na_examples: []

  - id: db-T08-schema-migration
    title: "T08: schema migration"
    difficulty: L3
    skill: schema-migration
    intent: |
      Apply a forward migration to `axarena_customers_{ns}`: add a new column
      `status` (text/varchar) with default value `active`. Use the vendor's
      idiomatic migration mechanism (migrations directory, dashboard, API).
    oracle_hint: |
      Read back the table schema; assert `status` column exists, is the
      correct type, and that all existing rows have `status='active'`.
    allowed_surfaces: [api, sdk, cli, mcp]
    na_examples: []

  - id: db-T09-runtime-integration
    title: "T09: runtime integration (function / edge)"
    difficulty: L3
    skill: runtime-integration
    intent: |
      Deploy or configure a serverless function / edge handler / hosted
      runtime mechanism (vendor's idiom) that, when invoked, connects to the
      database and returns the count of rows in `axarena_customers_{ns}` as
      JSON. Invoke it and report the response.
    oracle_hint: |
      Independently invoke the deployed function via the vendor's API or
      public URL; assert the response is JSON with the correct count.
    allowed_surfaces: [api, sdk, cli, mcp]
    na_examples:
      - "Vendor has no hosted function / edge runtime; document and mark N/A."

  - id: db-T10-backup-restore
    title: "T10: backup or point-in-time recovery"
    difficulty: L4
    skill: operational-ops
    intent: |
      Initiate a backup, snapshot, or branch (whichever maps to point-in-time
      recovery in the vendor's idiom). Report the snapshot/backup/branch
      identifier and its creation timestamp.
    oracle_hint: |
      List the vendor's backups/snapshots/branches; assert the agent's
      reported identifier is present with a creation timestamp within the
      last 60 seconds.
    allowed_surfaces: [api, sdk, cli, mcp]
    na_examples:
      - "Vendor exposes no programmatic backup/snapshot mechanism; document
         and mark N/A."

# Scoring axes (rendered on the methodology page, NOT consumed by the
# generator — included here as the canonical record):
scoring:
  per_task: pass | fail | na
  overall:
    formula: |
      score = sum(passes) / sum(non_na_tasks)
    notes: |
      N/A tasks are excluded from both numerator and denominator. The
      per-vendor leaderboard cell shows the score as a percentage and the
      N/A count separately. Cross-vendor comparisons are valid only across
      tasks both vendors execute (not N/A).
  surface_breakout: |
    Each task is scored independently on each of API, SDK, CLI, MCP where
    that surface is declared. The vendor's overall score is the average
    across non-N/A (task, surface) cells.
