  - capability_name: raft-replication
    title: Raft-Based Replication & Automatic Rebalancing
    family: core-operations
    description: Data is replicated via the Raft consensus protocol across nodes,
      with a configurable replication factor. The cluster automatically
      rebalances replicas when nodes join or leave, and a leaseholder serves
      reads without extra consensus rounds.
    resource_kind: stream
    operation_kind: stream
    surfaces_documented:
      - api
      - sdk
      - cli
    support_type: unknown
    evidence:
      - doc_url: https://www.cockroachlabs.com/docs/stable/architecture/replication-layer.html
        quote: Raft ensures that your data is safely stored on multiple machines, and
          that those machines agree on the current state even if some of them
          are temporarily disconnected.
    extraction_provenance:
      source: official-docs
      extracted_at: 2026-07-01T08:44:53.631Z
