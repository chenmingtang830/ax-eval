vendor: MongoDB Atlas
category: database
slug: mongodb-atlas
suite_name: DAEB-1
extracted_at: 2026-06-30T22:40:02.371Z
vendor_config:
  base_url: https://data.mongodb-api.com/app/{app-id}
  auth_type: api-key
  auth_header: apiKey
  auth_env: MONGODB_ATLAS_DATA_API_KEY
tasks:
  - task_id: db-T01-create-table
    na: false
    read_method: POST
    read_path_template: /data/v1/action/findOne
    assert_field: "Body:
      {dataSource,database,collection:'axarena_customers_{ns}',filter:{}}.
      Assert: response.document != null (collection exists and has documents);
      all three named field keys present in response.document"
  - task_id: db-T02-insert-rows
    na: false
    read_method: POST
    read_path_template: /data/v1/action/aggregate
    assert_field: "Body:
      {dataSource,database,collection:'axarena_customers_{ns}',pipeline:[{'$cou\
      nt':'total'}]}. Assert: response.documents[0].total == 100. Second call:
      /action/findOne with filter:{email:'{probe_email}'} — assert
      response.document contains expected name/email/id shape"
  - task_id: db-T03-query-pattern
    na: false
    read_method: POST
    read_path_template: /data/v1/action/find
    assert_field: "Body:
      {filter:{email:{'$regex':'^probe-(1$|1[0-9])'}},sort:{email:1}}. Assert:
      response.documents.length == 11. Second call with limit:5 — assert
      response.documents[0..4] are the five lexicographically lowest probe
      emails"
  - task_id: db-T04-rls-policy
    na: true
    na_reason: MongoDB Atlas has no native row-level security; database access
      control is collection/database-scoped via roles, not per-document read
      predicates enforced by the engine. Per-row filtering requires Atlas App
      Services rules (a separate application-layer product), not a core database
      policy mechanism.
  - task_id: db-T05-unique-constraint
    na: false
    read_method: POST
    read_path_template: /data/v1/action/aggregate
    assert_field: "Body:
      {filter:{email:'{duplicate_email}'},pipeline:[{'$count':'total'}]}.
      Assert: response.documents[0].total == 1. Agent's reported insertOne error
      message must contain 'E11000' (duplicate key error) or 'duplicate key'
      string"
  - task_id: db-T06-foreign-key
    na: true
    na_reason: MongoDB Atlas is a document database with no native foreign key
      constraints; cross-collection referential integrity is not enforced at the
      engine level, so a distinct FK-violation error code cannot be produced by
      a standard insert.
  - task_id: db-T07-export
    na: false
    read_method: POST
    read_path_template: /data/v1/action/aggregate
    assert_field: "Body: {pipeline:[{'$count':'total'}]}. Assert:
      response.documents[0].total == 100. Second call /action/findOne — assert
      response.document contains each expected field key from the export schema"
  - task_id: db-T08-schema-migration
    na: false
    read_method: POST
    read_path_template: /data/v1/action/aggregate
    assert_field: "Body:
      {pipeline:[{'$match':{'status':'active'}},{'$count':'total'}]}. Assert:
      response.documents[0].total == 100 (all existing rows have
      status='active'). Second call with pipeline
      [{$match:{status:{$exists:false}}},{$count:'total'}] — assert
      response.documents[0].total == 0 (no rows missing the field)"
  - task_id: db-T09-runtime-integration
    na: false
    read_method: GET
    read_path_template: /endpoint/{function-endpoint-name}
    assert_field: "Assert: HTTP 200; response body is valid JSON; response.count ==
      expected_count reported by agent"
  - task_id: db-T10-backup-restore
    na: false
    read_method: GET
    read_path_template: https://cloud.mongodb.com/api/atlas/v2/groups/{groupId}/clusters/{clusterName}/backup/snapshots
    assert_field: "Uses Admin API HTTP Digest auth (MONGODB_ATLAS_PUBLIC_KEY /
      MONGODB_ATLAS_PRIVATE_KEY). Assert: response.results[] contains entry
      where id == agent_reported_snapshot_id; entry.createdAt parses to a
      timestamp within 60s of now; entry.status in
      ['completed','queued','inProgress']"
