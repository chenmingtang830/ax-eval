  - task_id: db-T10-backup-restore
    na: false
    approach: Use the Atlas Administration API to trigger an on-demand cloud backup
      snapshot. POST to the snapshots endpoint for the target cluster using
      Digest authentication with the Atlas public/private API key pair. Record
      the `id` and `createdAt` fields from the response.
    mechanism: Atlas Administration API v1.0 — cloud backup on-demand snapshot
      (`POST /backup/snapshots`)
    snippet: >-
      curl --user "<publicKey>:<privateKey>" --digest \
        --header 'Content-Type: application/json' \
        --request POST \
        'https://cloud.mongodb.com/api/atlas/v1.0/groups/{groupId}/clusters/{clusterName}/backup/snapshots' \
        --data '{
          "description": "axarena-benchmark-snapshot",
          "retentionInDays": 1
        }'
      # Response includes: { "id": "<snapshotId>", "createdAt": "<ISO8601>",
      "status": "queued", ... }
    oracle_approach: GET
      `https://cloud.mongodb.com/api/atlas/v1.0/groups/{groupId}/clusters/{clusterName}/backup/snapshots`;
      parse the `results` array; find the entry whose `id` matches the returned
      snapshot ID; assert `createdAt` is within 60 seconds of the POST request
      time and `status` is `queued`, `inProgress`, or `completed`.
