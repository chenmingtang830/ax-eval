  - task_id: db-T04-rls-policy
    na: true
    na_reason: MongoDB Atlas has no native row-level security at the database engine
      layer; access control is collection-scoped via database users, not per-row
      predicate filtering; no REST assertion can verify per-user row visibility
      without Atlas App Services as an additional deployment
    checks: []
  - task_id: db-T05-unique-constraint
    na: false
    checks:
      - read_method: POST
        read_path_template: https://data.mongodb-api.com/app/{appId}/endpoint/data/v1/action/aggregate
        assert_field: documents.0.n
        expected: 1
        description: pipeline [$match:{email:<duplicate_email>},$count:n] — unique index
          blocked second insert, count is 1
  - task_id: db-T06-foreign-key
    na: true
    na_reason: MongoDB has no foreign key constraint mechanism; the engine never
      raises a referential-integrity violation, so the required insert-failure
      mode is structurally absent
    checks: []
