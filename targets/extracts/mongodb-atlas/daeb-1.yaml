  - task_id: db-T08-schema-migration
    na: false
    approach: "Because MongoDB is schemaless, a forward migration is a bulk write:
      call `updateMany` with `{ status: { $exists: false } }` and `$set: {
      status: 'active' }` to backfill all existing documents. Then optionally
      update the Atlas Schema Validation rule (via `collMod`) to require the
      `status` field in future documents."
    mechanism: MongoDB `updateMany` + Atlas Schema Validation (`collMod` with
      `$jsonSchema`)
    snippet: |-
      // Backfill existing documents
      await col.updateMany(
        { status: { $exists: false } },
        { $set: { status: 'active' } }
      );

      // Enforce field going forward
      await db.command({
        collMod: 'axarena_customers_test',
        validator: {
          $jsonSchema: {
            bsonType: 'object',
            required: ['email', 'created_at', 'status'],
            properties: { status: { bsonType: 'string' } }
          }
        },
        validationAction: 'error'
      });
    oracle_approach: "Run `db.axarena_customers_{ns}.countDocuments({ status: {
      $exists: true } })` and assert 100. Run
      `db.axarena_customers_{ns}.countDocuments({ status: 'active' })` and
      assert 100. Call `db.getCollectionInfos({ name: 'axarena_customers_{ns}'
      })` and assert the `options.validator` JSON schema includes `status` as a
      required `string` field."
