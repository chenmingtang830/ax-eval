        const db = context.services.get('mongodb-atlas').db('mydb');
        const count = await db.collection('axarena_customers_test').countDocuments({});
        response.setHeader('Content-Type', 'application/json');
        response.setBody(JSON.stringify({ count }));
      };


      // Invoke (replace <app-id> and <endpoint-route>)

      // GET
      https://us-east-1.aws.data.mongodb-api.com/app/<app-id>/endpoint/count
    oracle_approach: Send an HTTP GET to the deployed endpoint URL; assert the HTTP
      status is 200, the body parses as valid JSON, and the `count` field equals
