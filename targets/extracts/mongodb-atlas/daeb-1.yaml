  - task_id: db-T01-create-table
    na: false
    approach: Create a collection named `axarena_customers_{ns}` using the MongoDB
      driver or mongosh. MongoDB is schemaless so there are no DDL columns; the
      unique email constraint is enforced via a unique index, and the `_id`
      field (ObjectId or client-generated UUID) is the primary key. `created_at`
      has no server-side column default — the agent sets it at insert time.
      Optionally add an Atlas Schema Validation rule ($jsonSchema) to enforce
      the shape.
    mechanism: mongosh shell / MongoDB Node.js driver + unique index
    snippet: >-
      // mongosh

      use mydb;

      db.createCollection("axarena_customers_test");

      db.axarena_customers_test.createIndex({ email: 1 }, { unique: true });

      // Optional schema validation

      db.runCommand({
        collMod: "axarena_customers_test",
        validator: { $jsonSchema: { bsonType: "object", required: ["email", "created_at"], properties: { email: { bsonType: "string" }, created_at: { bsonType: "date" } } } }
      });
    oracle_approach: "Run `db.getCollectionNames()` in the target database and
      assert `axarena_customers_{ns}` appears. Run
      `db.axarena_customers_{ns}.getIndexes()` and assert an index with `{
      email: 1 }` and `unique: true` is present."
  - task_id: db-T02-insert-rows
    na: false
    approach: Use `insertMany()` with an array of 100 documents. Each document has a
      client-generated UUID as `_id`, an email of the form
      `probe-<n>@axarena-{ns}.test`, and a deterministic `created_at` set to a
      base date plus `n` seconds so ordering is stable.
    mechanism: MongoDB Node.js driver `insertMany`
    snippet: |-
      const { MongoClient, UUID } = require('mongodb');
      const BASE = new Date('2024-01-01T00:00:00Z');
      const docs = Array.from({ length: 100 }, (_, i) => ({
        _id: new UUID(),
        email: `probe-${i + 1}@axarena-test.test`,
        created_at: new Date(BASE.getTime() + i * 1000)
      }));
      await db.collection('axarena_customers_test').insertMany(docs);
    oracle_approach: "Run `db.axarena_customers_{ns}.countDocuments({})` and assert
      100. Run `db.axarena_customers_{ns}.findOne({ email:
      'probe-1@axarena-{ns}.test' })` and assert the document contains `_id`,
      `email`, and `created_at` with the expected values."
  - task_id: db-T03-query-pattern
    na: false
    approach: "Use a `$regex` filter anchored at `^probe-1` to match probe-1 and
      probe-10..probe-19 (11 documents). Sort ascending by `created_at`.
      Paginate with `skip`/`limit`: page 1 is skip(0).limit(5), page 2 is
      skip(5).limit(5)."
    mechanism: MongoDB Node.js driver `find` with `$regex`, `sort`, `skip`, `limit`
    snippet: >-
      const filter = { email: { $regex: /^probe-1/ } };

      const sort  = { created_at: 1 };

      const page1 = await
      col.find(filter).sort(sort).skip(0).limit(5).toArray();

      const page2 = await
      col.find(filter).sort(sort).skip(5).limit(5).toArray();

      console.log('page1:', page1.map(d => d.email));

      console.log('page2:', page2.map(d => d.email));
    oracle_approach: "Run `db.axarena_customers_{ns}.countDocuments({ email: {
      $regex: /^probe-1/ } })` and assert 11. Re-run the page-1 query and assert
      it contains exactly the 5 documents with the lowest `created_at` values
      among those 11 (probe-1 through probe-5 by insertion order, or verify the
      5 smallest timestamps)."
  - task_id: db-T04-rls-policy
    na: false
    approach: "Use Atlas App Services (formerly MongoDB Realm) Collection Rules.
      Each document stores an `owner` field set to the App Services user ID at
      insert time. A collection role with `apply_when: { owner: '%%user.id' }`
      and `read: true` ensures each authenticated user's queries are
      automatically restricted to their own documents. Documents lacking a
      matching `owner` are invisible to the caller."
    mechanism: Atlas App Services Collection Rules (per-document read permissions
      via `%%user.id`)
    snippet: |-
      // Collection rule payload — set via Atlas App Services UI or Admin API
      {
        "collection": "axarena_customers_test",
        "database": "mydb",
        "roles": [
          {
            "name": "owner-only",
            "apply_when": { "owner": "%%user.id" },
            "read": true,
            "write": false,
            "insert": false,
            "delete": false
          }
        ]
      }
    oracle_approach: Authenticate as user A via the Atlas App Services SDK and call
      `collection.find({})` — assert only documents where `owner == userA.id`
      are returned. Authenticate as user B and repeat — assert only user B's
      documents appear, with zero overlap. Verify per-user counts match the
      number of documents inserted for each user.
  - task_id: db-T05-unique-constraint
    na: false
    approach: Confirm the unique index on `email` exists (created in T01) via
      `getIndexes()`. Attempt to insert a document with an email that already
      exists in the collection. MongoDB rejects it with error code 11000 (E11000
      duplicate key error).
    mechanism: MongoDB unique index + driver duplicate-key exception (E11000)
    snippet: >-
      // Verify index

      const indexes = await col.indexes();

      console.assert(indexes.some(i => i.key.email === 1 && i.unique === true));


      // Attempt duplicate insert

      try {
        await col.insertOne({ email: 'probe-1@axarena-test.test', created_at: new Date() });
      } catch (err) {
        console.log(err.code);    // 11000
        console.log(err.message); // E11000 duplicate key error ...
      }
    oracle_approach: "Run `db.axarena_customers_{ns}.countDocuments({ email:
      'probe-1@axarena-{ns}.test' })` and assert exactly 1. Inspect the caught
      error object and assert `err.code === 11000` or that the message contains
      the string `duplicate key`."
  - task_id: db-T06-foreign-key
    na: false
    approach: MongoDB has no native foreign-key constraints. The Atlas-idiomatic
      approach is to create `axarena_orders_{ns}` with a `customer_id` field
      that stores a reference to a customer `_id`, then enforce referential
      integrity via an Atlas App Services Database Trigger (pre-insert) that
      rejects orders whose `customer_id` does not resolve to an existing
      customer document. Insert one valid order referencing a known customer
      `_id`.
    mechanism: Atlas App Services Database Trigger (pre-insert validation) + manual
      document reference
    snippet: >-
      // Trigger function (Atlas App Services — fires on INSERT into
      axarena_orders)

      exports = async function(changeEvent) {
        const doc = changeEvent.fullDocument;
        const custColl = context.services.get('mongodb-atlas')
          .db('mydb').collection('axarena_customers_test');
        const exists = await custColl.findOne({ _id: doc.customer_id });
        if (!exists) {
          throw new Error(`FK violation: customer_id ${doc.customer_id} not found`);
        }
      };


      // Insert valid order

      await db.collection('axarena_orders_test').insertOne({
        _id: new UUID(), customer_id: knownCustomerId, amount: 99.99
      });
    oracle_approach: "Attempt to insert an order with a randomly generated
      `customer_id` that does not exist; assert the trigger throws an FK
      violation error. Query `db.axarena_orders_{ns}.findOne({ customer_id:
      knownCustomerId })` and assert `amount` is correct."
