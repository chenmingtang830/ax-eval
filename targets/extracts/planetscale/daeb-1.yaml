  - task_id: db-T10-backup-restore
    na: false
    approach: PlanetScale supports on-demand backups per branch via the CLI (`pscale
      backup create`) or the REST API. Create a named backup, then retrieve the
      response to capture the backup ID and created_at timestamp.
    mechanism: PlanetScale backup API / pscale backup create CLI
    snippet: >-
      # Create on-demand backup via CLI

      pscale backup create <database> main --name axarena-snap-{ns}


      # Or via REST API:

      curl -s -X POST \
        'https://api.planetscale.com/v1/organizations/{org}/databases/{database}/branches/main/backups' \
        -H 'Authorization: <service-token>' \
        -H 'Content-Type: application/json' \
        -d '{"name": "axarena-snap-{ns}"}'
    oracle_approach: Run `pscale backup list <database> main` or GET
      /v1/organizations/{org}/databases/{database}/branches/main/backups; assert
      the reported backup name/ID is present and its created_at timestamp is
      within 60 seconds of the request time.
