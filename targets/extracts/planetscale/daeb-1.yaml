tasks:
  - task_id: db-T01-create-table
    na: false
    read_method: GET
    read_path_template: /organizations/{organization}/databases/{database}/branches/{branch}/schema
    assert_field: data[?name=='axarena_customers_{ns}'].raw — assert entry exists
      and raw DDL contains all three named column definitions
  - task_id: db-T02-insert-rows
    na: true
    na_reason: PlanetScale REST API explicitly provides no direct data access; row
      counting and row sampling require a live MySQL connection, not an HTTP
      endpoint.
  - task_id: db-T03-query-pattern
    na: true
    na_reason: PlanetScale REST API has no SQL query execution endpoint; filtered
      row reads and paginated result sets require a direct MySQL connection.
  - task_id: db-T04-rls-policy
    na: true
    na_reason: PlanetScale runs MySQL, which has no native Row-Level Security; RLS
      is a PostgreSQL-only mechanism and is structurally absent in MySQL.
  - task_id: db-T05-unique-constraint
    na: true
    na_reason: Row counting and DML error inspection require a direct MySQL
      connection; PlanetScale REST API provides no data read or error replay
      endpoint.
  - task_id: db-T06-foreign-key
    na: true
    na_reason: INSERT execution and FK violation error inspection require a direct
      MySQL connection; PlanetScale REST API has no DML or query endpoint.
  - task_id: db-T07-export
    na: true
    na_reason: PlanetScale REST API offers no bulk data export endpoint; exports are
      performed via mysqldump or a direct database connection.
  - task_id: db-T08-schema-migration
    na: false
    read_method: GET
    read_path_template: /organizations/{organization}/databases/{database}/branches/{branch}/schema
    assert_field: data[?name=='axarena_customers_{ns}'].raw — assert entry exists
      and raw DDL contains 'status' column with the correct type and DEFAULT
      'active'
  - task_id: db-T09-runtime-integration
    na: true
    na_reason: PlanetScale is a database-only service with no serverless or edge
      function deployment platform; there is no function execution or invocation
      endpoint.
  - task_id: db-T10-backup-restore
    na: false
    read_method: GET
    read_path_template: /organizations/{organization}/databases/{database}/branches/{branch}/backups
    assert_field: data[?id=='{reported_backup_id}'] — assert entry exists with
      state='success' and created_at within the last 60 seconds
