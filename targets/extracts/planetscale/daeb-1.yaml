  - task_id: db-T05-unique-constraint
    na: false
    approach: The UNIQUE KEY on email was declared at table creation (T01). Attempt
      a duplicate INSERT via `pscale shell`; MySQL raises error 1062
      (ER_DUP_ENTRY / SQLSTATE 23000). Capture and report the error.
    mechanism: MySQL UNIQUE constraint — error 1062 ER_DUP_ENTRY
    snippet: |-
      -- Attempt duplicate insert (expected to fail):
      INSERT INTO axarena_customers_{ns} (email, created_at)
      VALUES ('probe-1@axarena-{ns}.test', NOW());
      -- Expected: ERROR 1062 (23000): Duplicate entry
      --   'probe-1@axarena-{ns}.test' for key 'uq_email'
    oracle_approach: Run `SELECT COUNT(*) FROM axarena_customers_{ns} WHERE
      email='probe-1@axarena-{ns}.test';` and assert count=1. Inspect the error
      message for '1062' or 'Duplicate entry'.
  - task_id: db-T06-foreign-key
    na: false
    approach: PlanetScale added opt-in foreign key constraint support (GA 2023).
      Enable it on the database (dashboard setting or API flag), then create the
      orders table with a FOREIGN KEY referencing axarena_customers_{ns}.id via
      standard MySQL DDL on a dev branch and deploy via deploy request.
    mechanism: MySQL FOREIGN KEY constraint with PlanetScale FK support enabled
    snippet: >-
      -- Requires FK support enabled on the database (PlanetScale dashboard or
      API)

      -- Run in pscale shell on dev branch:

      CREATE TABLE axarena_orders_{ns} (
        id INT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
        customer_id INT UNSIGNED NOT NULL,
        amount DECIMAL(10,2) NOT NULL,
        CONSTRAINT fk_order_customer
          FOREIGN KEY (customer_id)
          REFERENCES axarena_customers_{ns}(id)
          ON DELETE RESTRICT ON UPDATE CASCADE
      );


      -- Valid insert (customer id=1 must exist):

      INSERT INTO axarena_orders_{ns} (customer_id, amount) VALUES (1, 99.99);


      -- Invalid insert (triggers FK violation):

      INSERT INTO axarena_orders_{ns} (customer_id, amount) VALUES (999999,
      9.99);

      -- Expected: ERROR 1452 (23000): Cannot add or update a child row
    oracle_approach: Assert the invalid insert fails with MySQL error 1452
      (ER_NO_REFERENCED_ROW_2). Run `SELECT * FROM axarena_orders_{ns} WHERE
      customer_id=1;` and assert the valid order row is present.
  - task_id: db-T07-export
    na: false
    approach: Use `pscale database dump` to export the branch as SQL files, or
      tunnel via `pscale connect` and use the mysql CLI with `--batch` flag to
      emit tab-separated output redirected to a CSV file. For JSON, pipe through
      a formatter or use the `@planetscale/database` driver to SELECT all rows
      and serialize.
    mechanism: pscale database dump CLI or mysql --batch CSV via pscale connect proxy
    snippet: |-
      # Option A: SQL dump
      pscale database dump <database> dev --output ./dump/

      # Option B: CSV via mysql client through pscale tunnel
      pscale connect <database> dev --port 3309 &
      mysql -h 127.0.0.1 -P 3309 -u root \
        -e "SELECT id, email, created_at FROM axarena_customers_{ns}" \
        --batch --silent > axarena_customers_{ns}.csv
    oracle_approach: Parse the exported CSV or SQL dump; count records and assert
      exactly 100. Verify each record contains id, email, and created_at fields.
  - task_id: db-T08-schema-migration
    na: false
    approach: "Use PlanetScale's branch-based deploy request workflow: (1) run ALTER
      TABLE on a dev branch, (2) open a deploy request targeting the main
      branch, (3) deploy it. PlanetScale executes the DDL as a non-blocking
      online schema change. The DEFAULT 'active' ensures all existing rows
      receive the value."
    mechanism: PlanetScale deploy request (branch-based non-blocking schema migration)
    snippet: |-
      # 1. Apply ALTER on dev branch
      pscale shell <database> dev

      ALTER TABLE axarena_customers_{ns}
        ADD COLUMN status VARCHAR(255) NOT NULL DEFAULT 'active';

      # 2. Create and deploy the deploy request
      pscale deploy-request create <database> dev
      pscale deploy-request deploy <database> <deploy-request-number>
    oracle_approach: After deployment, run `DESCRIBE axarena_customers_{ns};` on the
      main branch and assert the status column exists with type varchar(255) and
      default 'active'. Run `SELECT COUNT(*) FROM axarena_customers_{ns} WHERE
      status != 'active';` and assert 0.
