vendor: PlanetScale
category: database
slug: planetscale
suite_name: DAEB-1
extracted_at: 2026-07-01T01:59:56.878Z
vendor_config:
  base_url: https://api.planetscale.com/v1
  auth_type: api-key
  auth_header: Authorization
  auth_env: PLANETSCALE_SERVICE_TOKEN
  sql_dialect: mysql
  sql_connection_env: PLANETSCALE_DATABASE_URL
tasks:
  - task_id: db-T01-create-table
    na: false
    checks:
      - sql_query: SELECT COUNT(*) AS count FROM information_schema.tables WHERE
          table_schema = DATABASE() AND table_name = 'axarena_customers_{ns}'
        assert_field: count
        expected: 1
        description: table axarena_customers_{ns} exists
      - sql_query: SELECT COUNT(*) AS count FROM information_schema.columns WHERE
          table_schema = DATABASE() AND table_name = 'axarena_customers_{ns}'
        assert_field: count
        expected: 3
        description: table has exactly 3 columns
  - task_id: db-T02-insert-rows
    na: false
    checks:
      - sql_query: SELECT COUNT(*) AS count FROM `axarena_customers_{ns}`
        assert_field: count
        expected: 100
        description: exactly 100 rows present
      - sql_query: SELECT COUNT(*) AS count FROM `axarena_customers_{ns}` WHERE id IS
          NULL OR name IS NULL OR email IS NULL
        assert_field: count
        expected: 0
        description: all rows have non-null id, name, email — expected shape holds
  - task_id: db-T03-query-pattern
    na: false
    checks:
      - sql_query: SELECT COUNT(*) AS count FROM `axarena_customers_{ns}` WHERE email
          REGEXP '^probe-1[0-9]?@'
        assert_field: count
        expected: 11
        description: exactly 11 rows match probe-1 and probe-10..probe-19
      - sql_query: SELECT email FROM `axarena_customers_{ns}` WHERE email REGEXP
          '^probe-1[0-9]?@' ORDER BY email ASC LIMIT 1
        assert_field: 0.email
        expected: probe-1@example.com
        description: lowest-ordered matching email is probe-1 (page-1 leading entry)
  - task_id: db-T04-rls-policy
    na: true
    na_reason: PlanetScale runs on MySQL/Vitess which has no native row-level
      security mechanism. Per-user row isolation is application-layer logic;
      verifying it requires two separately authenticated DB connections, which
      the single sql_connection_env format cannot express and which no
      PlanetScale management API endpoint can substitute.
    checks: []
  - task_id: db-T05-unique-constraint
    na: false
    checks:
      - sql_query: SELECT COUNT(*) AS count FROM `axarena_customers_{ns}` WHERE email =
          'probe-1@example.com'
        assert_field: count
        expected: 1
        description: duplicate insert rejected; exactly 1 row with the duplicate email
          (MySQL error 1062 / SQLSTATE 23000)
      - sql_query: SELECT COUNT(*) AS count FROM (SELECT email FROM
          `axarena_customers_{ns}` GROUP BY email HAVING COUNT(*) > 1) t
        assert_field: count
        expected: 0
        description: no email value appears more than once across the table
  - task_id: db-T06-foreign-key
    na: false
    checks:
      - sql_query: SELECT COUNT(*) AS count FROM `axarena_orders_{ns}` o LEFT JOIN
          `axarena_customers_{ns}` c ON o.customer_id = c.id WHERE c.id IS NULL
        assert_field: count
        expected: 0
        description: no orphaned orders; FK-violating insert was rejected (MySQL error 1452)
      - sql_query: SELECT COUNT(*) AS count FROM `axarena_orders_{ns}` o JOIN
          `axarena_customers_{ns}` c ON o.customer_id = c.id
        assert_field: count
        expected: 1
        description: valid order exists with a matching customer row
  - task_id: db-T07-export
    na: false
    checks:
      - sql_query: SELECT COUNT(*) AS count FROM `axarena_customers_{ns}`
        assert_field: count
        expected: 100
        description: source table has exactly 100 rows matching expected export record count
      - sql_query: SELECT COUNT(*) AS count FROM information_schema.columns WHERE
          table_schema = DATABASE() AND table_name = 'axarena_customers_{ns}'
          AND column_name IN ('id', 'name', 'email')
        assert_field: count
        expected: 3
        description: all three expected export fields (id, name, email) present in schema
  - task_id: db-T08-schema-migration
    na: false
    checks:
      - sql_query: SELECT COUNT(*) AS count FROM information_schema.columns WHERE
          table_schema = DATABASE() AND table_name = 'axarena_customers_{ns}'
          AND column_name = 'status'
        assert_field: count
        expected: 1
        description: status column exists after migration
      - sql_query: SELECT DATA_TYPE AS data_type FROM information_schema.columns WHERE
          table_schema = DATABASE() AND table_name = 'axarena_customers_{ns}'
          AND column_name = 'status'
        assert_field: 0.data_type
        expected: varchar
        description: status column is varchar type
      - sql_query: SELECT COUNT(*) AS count FROM `axarena_customers_{ns}` WHERE status
          != 'active' OR status IS NULL
        assert_field: count
        expected: 0
        description: all pre-existing rows have status='active' after migration backfill
  - task_id: db-T09-runtime-integration
    na: true
    na_reason: PlanetScale is a database-only managed service with no compute or
      function-hosting capability; the deployed function runs on an external
      platform not addressable through PlanetScale's management API.
    checks: []
  - task_id: db-T10-backup-restore
    na: false
    checks:
      - read_method: GET
        read_path_template: /organizations/{org}/databases/{db}/branches/{branch}/backups
        assert_field: data.0.id
        expected: "{agent_reported_backup_id}"
        description: agent-reported backup ID is present as the most recent backup entry
      - read_method: GET
        read_path_template: /organizations/{org}/databases/{db}/branches/{branch}/backups
        assert_field: data.0.state
        expected: success
        description: most recent backup completed with state=success
