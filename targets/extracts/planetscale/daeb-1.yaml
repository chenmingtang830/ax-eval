tasks:
  - task_id: db-T01-create-table
    na: false
    approach: Connect to a PlanetScale development branch via `pscale shell` (or a
      MySQL client proxied through `pscale connect`) and run standard MySQL DDL.
      Production schema changes require a deploy request, but on a dev branch
      DDL executes directly.
    mechanism: MySQL DDL via pscale shell / pscale connect proxy
    snippet: |-
      # Open a shell on a dev branch
      pscale shell <database> dev

      -- Inside the MySQL shell:
      CREATE TABLE axarena_customers_{ns} (
        id INT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
        email VARCHAR(255) NOT NULL,
        created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
        UNIQUE KEY uq_email (email)
      );
    oracle_approach: Run `SHOW TABLES LIKE 'axarena_customers_%';` then `DESCRIBE
      axarena_customers_{ns};` on the same branch; assert the table exists with
      columns id, email, and created_at.
  - task_id: db-T02-insert-rows
    na: false
    approach: Build a single multi-row INSERT statement (MySQL supports thousands of
      value tuples per statement) and execute it through `pscale shell` or a
      MySQL client proxied via `pscale connect`. A script generates the 100
      value tuples with deterministic timestamps.
    mechanism: MySQL multi-row INSERT via pscale shell
    snippet: |-
      -- Script-generated VALUES list (abbreviated):
      INSERT INTO axarena_customers_{ns} (email, created_at) VALUES
        ('probe-1@axarena-{ns}.test',  '2024-01-01 00:00:01'),
        ('probe-2@axarena-{ns}.test',  '2024-01-01 00:00:02'),
        -- ... n=3..99
        ('probe-100@axarena-{ns}.test','2024-01-01 00:01:40');
    oracle_approach: Run `SELECT COUNT(*) FROM axarena_customers_{ns};` and assert
      100. Run `SELECT * FROM axarena_customers_{ns} WHERE
      email='probe-1@axarena-{ns}.test';` and assert one row with the expected
      email and created_at.
  - task_id: db-T03-query-pattern
    na: false
    approach: "Execute a MySQL LIKE query with ORDER BY created_at and LIMIT/OFFSET
      pagination through `pscale shell` or the `@planetscale/database` HTTP
      driver. Issue two queries: OFFSET 0 for page 1 and OFFSET 5 for page 2."
    mechanism: MySQL LIKE + LIMIT/OFFSET via pscale shell or @planetscale/database driver
    snippet: |-
      -- Page 1 (rows 1-5)
      SELECT id, email, created_at
      FROM axarena_customers_{ns}
      WHERE email LIKE 'probe-1%@axarena-{ns}.test'
      ORDER BY created_at
      LIMIT 5 OFFSET 0;

      -- Page 2 (rows 6-10)
      SELECT id, email, created_at
      FROM axarena_customers_{ns}
      WHERE email LIKE 'probe-1%@axarena-{ns}.test'
      ORDER BY created_at
      LIMIT 5 OFFSET 5;
    oracle_approach: Re-run without LIMIT and count; assert 11 rows (probe-1,
      probe-10 through probe-19). Verify page 1 contains the 5 rows with the
      lowest created_at values among the 11 matches.
