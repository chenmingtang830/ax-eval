vendor: Neon
category: database
slug: neon
suite_name: DAEB-1
extracted_at: 2026-07-01T02:01:09.582Z
vendor_config:
  base_url: https://console.neon.tech/api/v2
  auth_type: bearer
  auth_header: Authorization
  auth_env: NEON_API_KEY
  sql_dialect: postgres
  sql_connection_env: NEON_DATABASE_URL
tasks:
  - task_id: db-T01-create-table
    na: false
    checks:
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM information_schema.tables WHERE
          table_schema = 'public' AND table_name = 'axarena_customers_{ns}'
        assert_field: count
        expected: 1
        description: Table axarena_customers_{ns} exists in public schema
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM information_schema.columns WHERE
          table_schema = 'public' AND table_name = 'axarena_customers_{ns}'
        assert_field: count
        expected: 3
        description: Table has exactly 3 columns
  - task_id: db-T02-insert-rows
    na: false
    checks:
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM axarena_customers_{ns}
        assert_field: count
        expected: 100
        description: Exactly 100 rows in table
      - sql_dialect: postgres
        sql_query: SELECT email FROM axarena_customers_{ns} WHERE email =
          'probe-1@axarena-{ns}.test' LIMIT 1
        assert_field: 0.email
        expected: probe-1@axarena-{ns}.test
        description: Sampled row by email exists with expected namespace-aware shape
  - task_id: db-T03-query-pattern
    na: false
    checks:
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM axarena_customers_{ns} WHERE email
          ~ '^probe-9([0-9])?@axarena-{ns}\\.test$'
        assert_field: count
        expected: 11
        description: Exactly 11 rows match probe-9 and probe-90..probe-99
      - sql_dialect: postgres
        sql_query: SELECT email FROM axarena_customers_{ns} WHERE email ~
          '^probe-9([0-9])?@axarena-{ns}\\.test$' ORDER BY email ASC LIMIT 5
        assert_field: 0.email
        expected: probe-9@axarena-{ns}.test
        description: First (lowest alphabetical) email in page-1 is probe-9@axarena-{ns}.test
  - task_id: db-T04-rls-policy
    na: false
    checks:
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM pg_policies WHERE tablename =
          'axarena_customers_{ns}'
        assert_field: count
        expected: 1
        description: At least one RLS policy is defined on axarena_customers_{ns}
      - sql_dialect: postgres
        sql_query: SELECT COUNT(DISTINCT user_id)::int AS count FROM
          axarena_customers_{ns}
        assert_field: count
        expected: 2
        description: Rows are partitioned across exactly 2 distinct user_ids (two
          isolated users)
  - task_id: db-T05-unique-constraint
    na: false
    checks:
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM axarena_customers_{ns} WHERE email
          = 'probe-1@example.com'
        assert_field: count
        expected: 1
        description: Duplicate email attempt leaves exactly 1 row with that email
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM
          information_schema.table_constraints tc JOIN
          information_schema.constraint_column_usage cu ON tc.constraint_name =
          cu.constraint_name WHERE tc.table_schema = 'public' AND tc.table_name
          = 'axarena_customers_{ns}' AND tc.constraint_type = 'UNIQUE' AND
          cu.column_name = 'email'
        assert_field: count
        expected: 1
        description: UNIQUE constraint on email column exists (PostgreSQL error code
          23505 class)
  - task_id: db-T06-foreign-key
    na: false
    checks:
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM
          information_schema.table_constraints WHERE table_schema = 'public' AND
          table_name = 'axarena_orders_{ns}' AND constraint_type = 'FOREIGN KEY'
        assert_field: count
        expected: 1
        description: FOREIGN KEY constraint exists on axarena_orders_{ns} (PostgreSQL
          error code 23503 class)
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM axarena_orders_{ns} o JOIN
          axarena_customers_{ns} c ON o.customer_id = c.id
        assert_field: count
        expected: 1
        description: Valid order's customer_id references an existing customer row
  - task_id: db-T07-export
    na: false
    checks:
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM axarena_customers_{ns}
        assert_field: count
        expected: 100
        description: Source table has exactly 100 records matching expected export count
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM information_schema.columns WHERE
          table_schema = 'public' AND table_name = 'axarena_customers_{ns}' AND
          column_name IN ('id', 'email', 'name')
        assert_field: count
        expected: 3
        description: All three expected export fields (id, email, name) are present in
          schema
  - task_id: db-T08-schema-migration
    na: false
    checks:
      - sql_dialect: postgres
        sql_query: SELECT data_type FROM information_schema.columns WHERE table_schema =
          'public' AND table_name = 'axarena_customers_{ns}' AND column_name =
          'status'
        assert_field: 0.data_type
        expected: text
        description: status column exists and is text type
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM axarena_customers_{ns} WHERE
          status IS DISTINCT FROM 'active'
        assert_field: count
        expected: 0
        description: All pre-existing rows have status = 'active' after migration
  - task_id: db-T09-runtime-integration
    na: false
    checks:
      - read_method: GET
        read_path_template: "{NEON_FUNCTION_URL}"
        assert_field: count
        expected: 100
        description: Deployed function returns JSON with count=100
      - sql_dialect: postgres
        sql_query: SELECT COUNT(*)::int AS count FROM axarena_customers_{ns}
        assert_field: count
        expected: 100
        description: Underlying Neon table has 100 rows (data the function reads)
  - task_id: db-T10-backup-restore
    na: false
    checks:
      - read_method: GET
        read_path_template: /projects/{project_id}/branches/{branch_id}
        assert_field: branch.id
        expected: "{branch_id}"
        description: Agent's reported Neon branch (backup snapshot) exists with matching id
      - read_method: GET
        read_path_template: /projects/{project_id}/branches/{branch_id}
        assert_field: branch.created_at
        expected: true
        description: Branch has a created_at timestamp (harness must verify it is within
          60s of now)
