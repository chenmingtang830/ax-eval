    family: access-control
    description: Postgres RLS policies restrict which rows each user can read or
      write; the authentication JWT is injected into every SDK and REST call
      automatically, so policies evaluate identity claims on a per-row basis
      without application-layer filtering.
    resource_kind: resource
    operation_kind: read
    surfaces_documented:
