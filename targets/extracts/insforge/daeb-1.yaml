vendor: Insforge
category: database
slug: insforge
suite_name: DAEB-1
extracted_at: 2026-06-30T22:38:45.720Z
vendor_config:
  base_url: https://{project}.insforge.app
  auth_type: bearer
  auth_env: INSFORGE_API_KEY
tasks:
  - task_id: db-T01-create-table
    na: false
    read_method: GET
    read_path_template: /api/database/tables/axarena_customers_{ns}/schema
    assert_field: response.table_name == 'axarena_customers_{ns}';
      response.columns[*].name contains all three expected column names
  - task_id: db-T02-insert-rows
    na: false
    read_method: GET
    read_path_template: /api/database/records/axarena_customers_{ns}?limit=1
    assert_field: response header X-Total-Count == '100'; body[0] contains expected
      keys (id, email, ...)
  - task_id: db-T03-query-pattern
    na: false
    read_method: GET
    read_path_template: /api/database/records/axarena_customers_{ns}?email=like.probe-%25&order=email.asc&limit=5&offset=0
    assert_field: header X-Total-Count == '11'; body length == 5; body[*].email are
      the 5 lexicographically lowest probe-N addresses (probe-1, probe-10,
      probe-11, probe-12, probe-13)
  - task_id: db-T04-rls-policy
    na: false
    read_method: GET
    read_path_template: /api/database/records/axarena_customers_{ns}
    assert_field: "call once with user-A Bearer token: X-Total-Count == user-A
      expected count, body contains no user-B rows; call again with user-B
      Bearer token: X-Total-Count == user-B expected count, body contains no
      user-A rows"
  - task_id: db-T05-unique-constraint
    na: false
    read_method: GET
    read_path_template: /api/database/records/axarena_customers_{ns}?email=eq.{duplicate_email}&limit=1
    assert_field: header X-Total-Count == '1'; agent's reported duplicate-insert
      error body.error or body.message contains 'unique', 'duplicate', or
      Postgres code '23505'
  - task_id: db-T06-foreign-key
    na: false
    read_method: GET
    read_path_template: /api/database/records/axarena_orders_{ns}?customer_id=eq.{valid_customer_id}&limit=1
    assert_field: header X-Total-Count == '1'; body[0].customer_id ==
      valid_customer_id; agent's invalid-insert error body.error or body.message
      contains 'foreign key' or Postgres code '23503'
  - task_id: db-T07-export
    na: false
    read_method: POST
    read_path_template: /api/database/advance/export
    assert_field: 'request body:
      {"tables":["axarena_customers_{ns}"],"format":"json","includeData":true};
      response body is a JSON array of length 100; each element contains all
      expected field keys'
  - task_id: db-T08-schema-migration
    na: false
    read_method: GET
    read_path_template: /api/database/tables/axarena_customers_{ns}/schema
    assert_field: response.columns contains an entry with name == 'status' and type
      matching expected (e.g. 'text' or 'varchar'); follow with GET
      /api/database/records/axarena_customers_{ns}?status=eq.active and assert
      header X-Total-Count == '100'
  - task_id: db-T09-runtime-integration
    na: false
    read_method: GET
    read_path_template: /functions/{function_slug}
    assert_field: response Content-Type is application/json; body.count == expected_count
  - task_id: db-T10-backup-restore
    na: true
    na_reason: Insforge exposes branch/snapshot management exclusively via the
      @insforge/cli CLI tool (npx @insforge/cli branch list); no REST API
      endpoint exists to list or inspect database branches, backups, or
      snapshots.
    read_method: GET
