  - task_id: db-T02-insert-rows
    na: false
    approach: Build an array of 100 row objects with deterministic emails
      (`probe-<n>@axarena-ns.test`) and a sequential created_at, then pass the
      array to the SDK's bulk `.insert()` method in a single call.
    mechanism: "@insforge/sdk bulk insert"
    snippet: >-
      import { createClient } from '@insforge/sdk';

      const insforge = createClient({ baseUrl: process.env.INSFORGE_URL,
      anonKey: process.env.INSFORGE_ANON_KEY });

      const rows = Array.from({ length: 100 }, (_, i) => ({
        email: `probe-${i + 1}@axarena-ns.test`,
        created_at: new Date(Date.UTC(2024, 0, 1, 0, i, 0)).toISOString()
      }));

      const { data, error } = await insforge.database
        .from('axarena_customers_ns')
        .insert(rows)
        .select();
    oracle_approach: Run `npx @insforge/cli db query "SELECT COUNT(*) FROM
      axarena_customers_ns;"` and assert count = 100. Then query `SELECT * FROM
      axarena_customers_ns WHERE email = 'probe-42@axarena-ns.test'` and assert
      the row exists with the expected created_at.
  - task_id: db-T03-query-pattern
    na: false
    approach: Use the SDK query builder with `.like()` for the `probe-1%` email
      pattern, `.order('created_at')` for ordering, and `.range(offset,
      offset+4)` for 5-row pages. Fetch page 1 with range(0,4) and page 2 with
      range(5,9).
    mechanism: "@insforge/sdk query builder (.like, .order, .range)"
    snippet: |-
      // Page 1
      const { data: page1 } = await insforge.database
        .from('axarena_customers_ns')
        .select('*')
        .like('email', 'probe-1%@axarena-ns.test')
        .order('created_at', { ascending: true })
        .range(0, 4);

      // Page 2
      const { data: page2 } = await insforge.database
        .from('axarena_customers_ns')
        .select('*')
        .like('email', 'probe-1%@axarena-ns.test')
        .order('created_at', { ascending: true })
        .range(5, 9);
    oracle_approach: Re-run the same SDK query with no range to get the full
      matching set; assert total count = 11 (probe-1, probe-10 through
      probe-19). Assert page1[0].email is the alphabetically/chronologically
      lowest of the 11 and that pages are non-overlapping and collectively cover
      all 11 rows.
  - task_id: db-T04-rls-policy
    na: false
    approach: Add an `owner` column to the table, enable PostgreSQL RLS on it via
      SQL DDL, then create a SELECT policy that restricts rows to those where
      `owner` matches the authenticated user's ID (via `auth.uid()`). Execute
      these DDL statements through the CLI `db query` command. RLS integrates
      natively with Insforge's JWT-based auth system.
    mechanism: PostgreSQL RLS via SQL DDL (`@insforge/cli db query`)
    snippet: |-
      npx @insforge/cli db query "
      ALTER TABLE axarena_customers_ns ADD COLUMN IF NOT EXISTS owner uuid;
      ALTER TABLE axarena_customers_ns ENABLE ROW LEVEL SECURITY;
      CREATE POLICY users_see_own_rows
        ON axarena_customers_ns
        FOR SELECT
        USING (owner = auth.uid());
      "
    oracle_approach: Authenticate as two distinct users via the Insforge auth SDK,
      update a subset of rows with each user's ID as `owner`, then query
      `axarena_customers_ns` with each user's session token and assert each
      returns only their own rows and the counts match expectations.
  - task_id: db-T05-unique-constraint
    na: false
    approach: The UNIQUE constraint on `email` was declared in T01. Attempt a
      duplicate insert via the SDK and inspect the returned error object.
      PostgreSQL surfaces a unique-violation as error code `23505`.
    mechanism: "@insforge/sdk insert + PostgreSQL error code 23505"
    snippet: >-
      const { data, error } = await insforge.database
        .from('axarena_customers_ns')
        .insert({ email: 'probe-1@axarena-ns.test' });

      console.log(error.code);    // '23505'

      console.log(error.message); // 'duplicate key value violates unique
      constraint ...'
    oracle_approach: After the failed insert, run `SELECT COUNT(*) FROM
      axarena_customers_ns WHERE email = 'probe-1@axarena-ns.test'` and assert
      count = 1. Inspect `error.code` from the SDK response and assert it equals
      `'23505'`.
  - task_id: db-T06-foreign-key
    na: false
    approach: Create `axarena_orders_ns` via SQL DDL with a `REFERENCES` clause on
      `customer_id` pointing to `axarena_customers_ns(id)`. Insert a valid order
      via the SDK, then attempt an insert with a nonexistent `customer_id` and
      observe the FK violation error (code `23503`).
    mechanism: SQL DDL REFERENCES constraint via `@insforge/cli db query` + @insforge/sdk
    snippet: >-
      // DDL

      npx @insforge/cli db query "

      CREATE TABLE axarena_orders_ns (
        id          uuid    DEFAULT gen_random_uuid() PRIMARY KEY,
        customer_id uuid    NOT NULL REFERENCES axarena_customers_ns(id),
        amount      numeric NOT NULL
      );

      "


      // Valid insert (SDK)

      const { data: validOrder } = await insforge.database
        .from('axarena_orders_ns')
        .insert({ customer_id: existingCustomerId, amount: 99.99 })
        .select();

      // Invalid insert – nonexistent FK

      const { error } = await insforge.database
        .from('axarena_orders_ns')
        .insert({ customer_id: '00000000-0000-0000-0000-000000000000', amount: 1 });
      // error.code === '23503'
    oracle_approach: Assert `error.code === '23503'` for the bad insert. Query
      `axarena_orders_ns` joined to `axarena_customers_ns` for the valid order
      and assert the relationship holds (`customer_id` matches the inserted
      customer's `id`).
