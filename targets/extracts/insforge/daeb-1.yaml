        assert_field: records.length
        expected: 11
        description: probe-1* LIKE filter returns exactly 11 matching rows
      - read_method: GET
        read_path_template: /api/database/records/axarena_customers_{ns}?email=like.probe-1%25&order=email.asc&limit=5&offset=0
        assert_field: records.0.email
        expected: probe-1@example.com
