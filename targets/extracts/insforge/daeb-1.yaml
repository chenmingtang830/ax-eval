vendor: Insforge
category: database
slug: insforge
suite_name: DAEB-1
extracted_at: 2026-07-01T02:10:37.151Z
vendor_config:
  base_url: https://{app-slug}.insforge.app
  auth_type: bearer
  auth_env: INSFORGE_API_KEY
  sql_dialect: postgres
  sql_connection_env: INSFORGE_DATABASE_URL
tasks:
  - task_id: db-T01-create-table
    na: false
    checks:
      - read_method: GET
        read_path_template: /api/database/tables/axarena_customers_{ns}/schema
        assert_field: table_name
        expected: axarena_customers_{ns}
        description: table exists
      - sql_query: SELECT COUNT(*) AS count FROM information_schema.columns WHERE
          table_name = 'axarena_customers_{ns}' AND column_name IN
          ('id','email','name')
        assert_field: rows.0.count
        expected: 3
        description: columns id, email, name all present
  - task_id: db-T02-insert-rows
    na: false
    checks:
      - sql_query: SELECT COUNT(*) AS count FROM axarena_customers_{ns}
        assert_field: rows.0.count
        expected: 100
        description: exactly 100 rows
      - read_method: GET
        read_path_template: /api/database/records/axarena_customers_{ns}?email=eq.probe-1%40example.com&limit=1
        assert_field: 0.email
        expected: probe-1@example.com
        description: sample row by email has expected shape
  - task_id: db-T03-query-pattern
    na: false
    checks:
      - sql_query: SELECT COUNT(*) AS count FROM axarena_customers_{ns} WHERE email LIKE
          'probe-1%'
        assert_field: rows.0.count
        expected: 11
        description: 11 rows match probe-1 through probe-19
      - read_method: GET
        read_path_template: /api/database/records/axarena_customers_{ns}?email=like.probe-1%25&order=email.asc&limit=5&offset=0
        assert_field: 0.email
        expected: probe-1@example.com
        description: lowest-ordered row on page 1 (ASC) is probe-1@example.com
  - task_id: db-T04-rls-policy
    na: false
    checks:
      - read_method: GET
        read_path_template: /api/database/records/axarena_customers_{ns}
        assert_field: 0.email
        expected: user1@example.com
        description: "user1 JWT via POST /api/auth/sessions: first visible row belongs
          to user1 only"
      - read_method: GET
        read_path_template: /api/database/records/axarena_customers_{ns}
        assert_field: 0.email
        expected: user2@example.com
        description: "user2 JWT via POST /api/auth/sessions: first visible row belongs
          to user2 only"
  - task_id: db-T05-unique-constraint
    na: false
    checks:
      - sql_query: SELECT COUNT(*) AS count FROM axarena_customers_{ns} WHERE email =
          'probe-1@example.com'
        assert_field: rows.0.count
        expected: 1
        description: exactly 1 row with the duplicate email (constraint held)
      - read_method: POST
        read_path_template: /api/database/records/axarena_customers_{ns}
        assert_field: code
        expected: "23505"
        description: re-attempted duplicate insert returns Postgres unique-violation
          code 23505
  - task_id: db-T06-foreign-key
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/database/records/axarena_orders_{ns}
        assert_field: code
        expected: "23503"
        description: insert with non-existent customer_id returns FK-violation code 23503
      - read_method: GET
        read_path_template: /api/database/records/axarena_orders_{ns}?limit=1
        assert_field: 0.customer_id
        expected: "{valid-customer-id}"
        description: valid order row exists with correct customer_id
  - task_id: db-T07-export
    na: false
    checks:
      - sql_query: SELECT COUNT(*) AS count FROM axarena_customers_{ns}
        assert_field: rows.0.count
        expected: 100
        description: 100 records in source table matching export
      - read_method: GET
        read_path_template: /api/database/tables/axarena_customers_{ns}/schema
        assert_field: columns.0.name
        expected: id
        description: schema endpoint confirms expected fields present (id first column)
  - task_id: db-T08-schema-migration
    na: false
    checks:
      - sql_query: SELECT column_name AS column_name FROM information_schema.columns
          WHERE table_name = 'axarena_customers_{ns}' AND column_name = 'status'
        assert_field: rows.0.column_name
        expected: status
        description: status column exists after migration
      - sql_query: SELECT COUNT(*) AS count FROM axarena_customers_{ns} WHERE status =
          'active'
        assert_field: rows.0.count
        expected: 100
        description: all 100 pre-existing rows backfilled with status='active'
  - task_id: db-T09-runtime-integration
    na: false
    checks:
      - read_method: GET
        read_path_template: /functions/axarena-count-{ns}
        assert_field: count
        expected: 100
        description: deployed Deno edge function returns JSON with correct row count
  - task_id: db-T10-backup-restore
    na: false
    checks:
      - read_method: GET
        read_path_template: /api/database/migrations
        assert_field: migrations.0.name
        expected: "{agent-reported-backup-migration-name}"
        description: agent's backup migration version present in GET
          /api/database/migrations listing
      - sql_query: SELECT COUNT(*) AS count FROM axarena_customers_{ns}
        assert_field: rows.0.count
        expected: 100
        description: 100 rows intact after restore confirms backup/restore cycle succeeded
