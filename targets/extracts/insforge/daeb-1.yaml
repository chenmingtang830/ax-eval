  - task_id: db-T09-runtime-integration
    na: false
    approach: "Write a Deno edge function that imports the Insforge SDK, queries the
      row count of `axarena_customers_ns` using `{ count: 'exact', head: true
      }`, and returns the count as JSON. Deploy via `npx @insforge/cli functions
      deploy` and invoke via `npx @insforge/cli functions invoke` or the public
      HTTPS URL."
    mechanism: Insforge Edge Functions (Deno runtime) via `@insforge/cli functions
      deploy/invoke`
    snippet: |-
      // functions/row-count/index.ts
      import { createClient } from 'npm:@insforge/sdk';

      Deno.serve(async (_req: Request) => {
        const insforge = createClient({
          baseUrl: Deno.env.get('INSFORGE_URL')!,
          anonKey: Deno.env.get('INSFORGE_ANON_KEY')!
        });
        const { count, error } = await insforge.database
          .from('axarena_customers_ns')
          .select('*', { count: 'exact', head: true });
        return Response.json({ count });
      });

      // Deploy & invoke
      // npx @insforge/cli functions deploy row-count
      // npx @insforge/cli functions invoke row-count
    oracle_approach: Independently invoke the deployed function URL (returned by the
      deploy command or via `functions invoke`) and assert the response body is
      valid JSON with a `count` field equal to the current row count of
      `axarena_customers_ns` (expected 100 after T02).
