# Optional agent surface adapters for exec-plan (CLI / SDK / MCP only).
# REST API is always the implicit default surface and is intentionally omitted here;
# API auth and base URL come from the vendor oracle extract, not this file.
schema: ax.surface-extract/v1
vendor: Insforge
slug: insforge
extracted_at: 2026-07-08T10:53:13.870Z
extraction_context:
  mode: grounded-doc-crawl
  harness: claude-code
  notes: Grounded doc-crawl surface candidate.
audit_status: candidate
audit_notes:
  - Verify headless auth fields against vendor docs before publication.
  - sdk declares token auth but no headless credential env var.
  - "Post-extract audit: 2 surface finding(s)."
cli:
  bin: insforge
  install: npm install @insforge/cli --save-dev
  docs_url: https://docs.insforge.dev/agent-native/cli-harness
  auth:
    kind: token
    token_env: INSFORGE_API_KEY
    token_env_aliases: []
    instructions: Obtain API_KEY from InsForge Settings → Connect tab. The docs show
      interactive linking via `npx @insforge/cli link --project-id <id>`; a
      dedicated headless/CI env var name is not explicitly documented — use the
      API_KEY from the Connect tab.
sdk:
  package: "@insforge/sdk"
  language: node
  reference_url: https://docs.insforge.dev/sdks/typescript/overview
  auth:
    kind: token
    token_env_aliases: []
    instructions: Credentials are passed directly to createClient({ baseUrl, anonKey
      }). No standard env var names are defined by the docs; baseUrl is your app
      endpoint (e.g. https://your-app.insforge.app) and anonKey is the optional
      anonymous key for public requests.
mcp:
  server: https://mcp.insforge.dev/mcp
  transport: http
  docs_url: https://docs.insforge.dev/mcp-setup
  auth:
    kind: oauth_app
    token_env_aliases: []
    instructions: Primary auth is browser-based OAuth (opens a login window).
      API_KEY and API_BASE_URL are available from InsForge Settings → Connect
      tab and are required for project binding. Non-interactive/headless MCP
      auth is not explicitly documented; install via `npx add-mcp
      https://mcp.insforge.dev/mcp`.
