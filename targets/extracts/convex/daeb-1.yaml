    na: false
    approach: Define the table in convex/schema.ts using defineSchema and
      defineTable with email (v.string()) and created_at (v.number()) fields.
      Convex auto-generates the _id primary key (a string-encoded 64-bit ID —
      vendor's idiomatic PK). Add a by_email index for uniqueness enforcement
      later. Deploy with `npx convex deploy`. The table identifier is the string
      key passed to defineTable.
    mechanism: Convex schema-as-code (defineSchema / defineTable in convex/schema.ts)
    snippet: >-
      // convex/schema.ts

      import { defineSchema, defineTable } from "convex/server";

      import { v } from "convex/values";


      export default defineSchema({
        axarena_customers_ns: defineTable({
          email: v.string(),
          created_at: v.number(), // Unix ms timestamp; default set in insert mutation
        }).index("by_email", ["email"])
          .index("by_created_at", ["created_at"]),
      });

      // Deploy: npx convex deploy
    oracle_approach: 'Run a Convex query:
      `ctx.db.query("axarena_customers_ns").first()` — if the table name is
      unknown it throws at runtime. Verify via `npx convex data` in the
      dashboard or the Convex table browser that axarena_customers_ns exists
      with _id, email, and created_at fields on documents.'
  - task_id: db-T02-insert-rows
    na: false
    approach: Write a Convex mutation that loops n=1..100 calling ctx.db.insert()
      with deterministic email and created_at values. Invoke via `npx convex
      run`. Convex mutations are transactional; all 100 inserts run in a single
      transaction.
    mechanism: Convex mutation (ctx.db.insert via convex/server)
    snippet: |-
      // convex/seed.ts
      import { mutation } from "./_generated/server";
      import { v } from "convex/values";

      export const seedCustomers = mutation({
        args: { ns: v.string() },
        handler: async (ctx, { ns }) => {
          for (let n = 1; n <= 100; n++) {
            await ctx.db.insert("axarena_customers_ns", {
              email: `probe-${n}@axarena-${ns}.test`,
              created_at: 1700000000000 + n * 1000,
            });
          }
        },
      });
      // npx convex run seed:seedCustomers '{"ns":"test"}'
    oracle_approach: 'Run a Convex query:
      `ctx.db.query("axarena_customers_ns").collect()` and assert array length
      === 100. Fetch a specific row: `.withIndex("by_email", q => q.eq("email",
      "probe-5@axarena-test.test")).first()` and assert email and created_at
      match expected values.'
  - task_id: db-T03-query-pattern
    na: false
    approach: "Use a Convex query with .withIndex(\"by_email\") and an index range
      (gte/lt) to match the 'probe-1' prefix — all emails >= 'probe-1@' and <
      'probe-2' — then .order(\"asc\") and .paginate(). Call twice: first with
      cursor=null to get page 1, then pass page1.continueCursor to get page 2.
      Convex's paginationOptsValidator is the idiomatic arg type."
    mechanism: Convex query with .withIndex(), range bounds, and
      .paginate(paginationOptsValidator)
    snippet: >-
      // convex/customers.ts

      import { query } from "./_generated/server";

      import { paginationOptsValidator } from "convex/server";

      import { v } from "convex/values";


      export const queryByEmailPrefix = query({
        args: { ns: v.string(), paginationOpts: paginationOptsValidator },
        handler: async (ctx, { ns, paginationOpts }) => {
          return await ctx.db
            .query("axarena_customers_ns")
            .withIndex("by_email", q =>
              q.gte("email", `probe-1@axarena-${ns}.test`)
               .lt("email", `probe-2@axarena-${ns}.test`)
            )
            .order("asc")
            .paginate(paginationOpts);
        },
      });

      // Page 1: npx convex run customers:queryByEmailPrefix
      '{"ns":"test","paginationOpts":{"numItems":5,"cursor":null}}'

      // Page 2: replace cursor with page1.continueCursor
    oracle_approach: Collect all pages by exhausting continueCursor until
      isDone===true. Assert total unique emails across all pages === 11
      (probe-1@..., probe-10@... through probe-19@...). Assert page 1 contains
      the 5 alphabetically lowest matching emails. Assert no email outside the
      prefix appears.
  - task_id: db-T04-rls-policy
    na: false
    approach: "Convex has no SQL-style RLS. The idiomatic mechanism is
      function-level auth: add an owner field (v.string()) to the table schema,
      populate it with identity.subject on insert, and in every read query call
      ctx.auth.getUserIdentity() then filter by .withIndex('by_owner', q =>
      q.eq('owner', identity.subject)). Only the query function itself enforces
      the policy — there is no DB-layer enforcement outside of
      mutations/queries."
    mechanism: Convex function-level auth guard (ctx.auth.getUserIdentity +
      per-query .withIndex filter)
    snippet: |-
      // schema.ts — add owner field and index
      axarena_customers_ns: defineTable({
        email: v.string(),
        created_at: v.number(),
        owner: v.string(),  // identity.subject of the owning user
      }).index("by_email", ["email"])
        .index("by_owner", ["owner"]),

      // convex/customers.ts
      export const getMyCustomers = query({
        args: {},
        handler: async (ctx) => {
          const identity = await ctx.auth.getUserIdentity();
          if (!identity) throw new Error("Unauthenticated");
          return await ctx.db
            .query("axarena_customers_ns")
            .withIndex("by_owner", q => q.eq("owner", identity.subject))
            .collect();
        },
      });
    oracle_approach: Authenticate as user A (JWT with subject='userA') and call
      getMyCustomers; assert all returned rows have owner==='userA' and no rows
      with owner==='userB' appear. Repeat authenticated as user B. Assert row
      counts per user are correct and the union of both result sets covers only
      their respective owned rows.
  - task_id: db-T05-unique-constraint
    na: false
    approach: "Convex has no structural unique constraint at the storage layer.
      Uniqueness is enforced application-level inside the insert mutation: query
      the by_email index before inserting; if a document is found, throw a
      descriptive error. The by_email index defined in schema.ts makes this
      check an efficient O(log n) lookup rather than a full scan."
    mechanism: Application-level uniqueness guard in Convex mutation using
      .withIndex().first()
    snippet: >-
      export const insertCustomer = mutation({
        args: { email: v.string(), created_at: v.number() },
        handler: async (ctx, args) => {
          const existing = await ctx.db
            .query("axarena_customers_ns")
            .withIndex("by_email", q => q.eq("email", args.email))
            .first();
          if (existing !== null) {
            throw new Error(
              `ConvexError: unique constraint violation on field 'email': '${args.email}' already exists`
            );
          }
          return await ctx.db.insert("axarena_customers_ns", args);
        },
      });
    oracle_approach: After the failed duplicate insert, run `.withIndex("by_email",
      q => q.eq("email", duplicateEmail)).collect()` and assert length === 1.
      Assert the thrown error message contains 'unique constraint violation' (or
      equivalent). Confirm the total row count is still 100.
  - task_id: db-T06-foreign-key
    na: false
    approach: Add axarena_orders_ns to schema.ts with customer_id typed as
      v.id("axarena_customers_ns") — Convex's idiomatic typed reference that
      validates ID format at the type level. Enforce referential integrity in
      the insert mutation by calling ctx.db.get(customer_id); if null, throw a
      FK violation error. Convex has no structural DB-layer FK enforcement; the
      mutation is the enforcement point.
    mechanism: Convex v.id() typed reference + application-level FK check in
      mutation (ctx.db.get)
    snippet: >-
      // schema.ts addition

      axarena_orders_ns: defineTable({
        customer_id: v.id("axarena_customers_ns"),
        amount: v.number(),
      }),


      // convex/orders.ts

      export const insertOrder = mutation({
        args: {
          customer_id: v.id("axarena_customers_ns"),
          amount: v.number(),
        },
        handler: async (ctx, args) => {
          const customer = await ctx.db.get(args.customer_id);
          if (customer === null) {
            throw new Error(
              `ConvexError: foreign key violation — no customer with id '${args.customer_id}'`
            );
          }
          return await ctx.db.insert("axarena_orders_ns", args);
        },
      });
    oracle_approach: Attempt insertOrder with a syntactically valid but non-existent
      customer_id (e.g., reconstruct a plausible ID string); assert the mutation
      throws with 'foreign key violation'. Then insert with a real customer _id;
      call ctx.db.get(orderId) and assert the returned document's customer_id
      matches the real customer's _id.
