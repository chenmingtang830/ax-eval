      TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
      SNAPSHOT_PATH="./snapshot-${TIMESTAMP}.zip"
      npx convex export --path "${SNAPSHOT_PATH}"
      echo "Snapshot identifier: ${SNAPSHOT_PATH}"
      echo "Creation timestamp: ${TIMESTAMP}"
      ls -lh "${SNAPSHOT_PATH}"

      # To restore to a dev deployment:
      # npx convex import --path "${SNAPSHOT_PATH}" --yes
    oracle_approach: Assert the snapshot file exists at the reported path (`ls -l`
