  - task_id: db-T08-schema-migration
    na: false
    approach: "Add `status: v.optional(v.string())` to the table definition in
      schema.ts (optional first so existing documents remain valid), run `npx
      convex deploy`. Then write and run a backfill mutation that iterates all
      documents via ctx.db.query().collect() and calls ctx.db.patch(doc._id, {
      status: 'active' }) on each. Optionally tighten to v.string() and redeploy
      after backfill."
    mechanism: Convex schema update (schema.ts v.optional field) + backfill mutation
      (ctx.db.patch)
    snippet: |-
      // 1. schema.ts — add optional status field
      axarena_customers_ns: defineTable({
        email: v.string(),
        created_at: v.number(),
        status: v.optional(v.string()), // add this
      }).index("by_email", ["email"]),

      // 2. npx convex deploy

      // 3. convex/migrations.ts — backfill mutation
      export const backfillStatus = mutation({
        args: {},
        handler: async (ctx) => {
          const rows = await ctx.db.query("axarena_customers_ns").collect();
          for (const row of rows) {
            if (row.status === undefined) {
              await ctx.db.patch(row._id, { status: "active" });
            }
          }
          return { patched: rows.length };
        },
      });
      // npx convex run migrations:backfillStatus
    oracle_approach: After deploy and backfill, run
      ctx.db.query("axarena_customers_ns").collect() and assert every document
      has status==="active" (no undefined). Assert total count is still 100.
      Assert no document has status other than 'active'.
  - task_id: db-T09-runtime-integration
    na: false
    approach: Define a Convex HTTP action in convex/http.ts that calls an internal
      query to count all rows in axarena_customers_ns and returns the count as
      JSON. Deploy with `npx convex deploy`. The HTTP action is publicly
      reachable at `https://<deployment-slug>.convex.site/<path>`. No separate
      cloud function infrastructure is needed — Convex hosting serves the HTTP
      action.
    mechanism: Convex HTTP action (httpAction in convex/http.ts, served at *.convex.site)
    snippet: |-
      // convex/customers.ts — internal count query
      export const countAll = internalQuery({
        args: {},
        handler: async (ctx) => {
          const rows = await ctx.db.query("axarena_customers_ns").collect();
          return rows.length;
        },
      });

      // convex/http.ts
      import { httpRouter } from "convex/server";
      import { httpAction } from "./_generated/server";
      import { internal } from "./_generated/api";

      const http = httpRouter();
      http.route({
        path: "/customer-count",
        method: "GET",
        handler: httpAction(async (ctx) => {
          const count = await ctx.runQuery(internal.customers.countAll);
          return new Response(JSON.stringify({ count }), {
            status: 200,
            headers: { "Content-Type": "application/json" },
          });
        }),
      });
      export default http;
      // Deploy: npx convex deploy
      // Invoke: curl https://<deployment>.convex.site/customer-count
    oracle_approach: "Issue `curl -s
      https://<deployment>.convex.site/customer-count` independently. Assert
      HTTP 200, Content-Type: application/json, and parsed body has a `count`
      field equal to the current row count (100 after T02, or adjusted after
      T08). Re-invoke after inserting a row to assert count increments."
  - task_id: db-T10-backup-restore
