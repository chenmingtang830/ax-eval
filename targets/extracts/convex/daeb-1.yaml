tasks:
  - task_id: db-T01-create-table
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/query
        assert_field: status
        expected: success
        description: query against axarena_customers_{ns} returns success (table exists
          and is queryable; invalid table names cause status=error in Convex)
  - task_id: db-T02-insert-rows
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 100
        description: count function on axarena_customers_{ns} returns exactly 100
      - read_method: POST
        read_path_template: /api/query
        assert_field: value.email
        expected: probe-1@example.com
        description: document fetched by known email returns the correct email field
          (expected shape confirmed)
  - task_id: db-T03-query-pattern
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 11
        description: count of documents whose email matches probe-1 / probe-10..probe-19
          pattern is exactly 11
      - read_method: POST
        read_path_template: /api/query
        assert_field: value.page.0.email
        expected: probe-1@example.com
        description: first document in page 1 of the paginated result is the
          lexicographically lowest email (probe-1)
  - task_id: db-T04-rls-policy
    na: true
    na_reason: Convex has no built-in row-level security mechanism; the official
      docs state 'Convex doesn't need an opinionated authorization framework
      like RLS' — per-user data isolation exists only in application function
      code, not in the database layer, so no database-enforced per-user
      visibility can be asserted
    checks: []
  - task_id: db-T05-unique-constraint
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 1
        description: count of documents with the duplicate email is exactly 1 (second
          insert was rejected)
      - read_method: POST
        read_path_template: /api/mutation
        assert_field: status
        expected: error
        description: re-attempting the duplicate insert mutation returns Convex error
          status (application-layer uniqueness rejection)
  - task_id: db-T06-foreign-key
    na: true
    na_reason: Convex has no database-level foreign key enforcement;
      defineTable/defineSchema provide TypeScript type validation only — a
      mutation inserting a non-existent customer_id succeeds silently unless
      application code manually rejects it, so there is no native FK violation
      error to assert
    checks: []
  - task_id: db-T07-export
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 100
        description: query function collecting all documents from axarena_customers_{ns}
          returns count of exactly 100
      - read_method: POST
        read_path_template: /api/query
        assert_field: value.0.email
        expected: probe-1@example.com
        description: first document in the exported result set has an email field
          (expected record shape present)
  - task_id: db-T08-schema-migration
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/query
        assert_field: value.status
        expected: active
        description: sample document from axarena_customers_{ns} has status field equal
          to 'active' (column exists and is correct type)
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 100
        description: count of documents where status='active' equals 100 (all existing
          rows backfilled)
  - task_id: db-T09-runtime-integration
    na: false
    checks:
      - read_method: GET
        read_path_template: https://{deployment_name}.convex.site/customers/count
        assert_field: count
        expected: 100
        description: HTTP action on convex.site (Convex's HTTP-action domain, separate
          from the data API domain) returns JSON with count=100
  - task_id: db-T10-backup-restore
    na: true
    na_reason: Convex provides no documented public REST API to list or verify
      backups; backup management is exclusively through the dashboard UI or the
      CLI (npx convex export), with no programmatic endpoint to assert a
      snapshot identifier or creation timestamp
    checks: []
