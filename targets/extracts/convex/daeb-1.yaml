vendor: Convex
category: database
slug: convex
suite_name: DAEB-1
extracted_at: 2026-06-30T22:40:17.037Z
vendor_config:
  base_url: https://{CONVEX_DEPLOYMENT_NAME}.convex.cloud
  auth_type: bearer
  auth_env: CONVEX_DEPLOY_KEY
tasks:
  - task_id: db-T01-create-table
    na: true
    na_reason: Convex has no REST endpoint for schema or table introspection; the
      schema is defined in TypeScript (convex/schema.ts) and deployed via
      CLI—there is no HTTP API path that lists tables or their columns
  - task_id: db-T02-insert-rows
    na: false
    read_method: POST
    read_path_template: /api/run/axarena_customers:countAndSample
    assert_field: 'value.count === 100; value.sample contains email, name, createdAt
      fields (POST body: {"args":{"ns":"{ns}"}})'
  - task_id: db-T03-query-pattern
    na: false
    read_method: POST
    read_path_template: /api/run/axarena_customers:queryProbe
    assert_field: 'value.total === 11; value.page1.length === 5; value.page1 emails
      in ascending order (POST body:
      {"args":{"ns":"{ns}","page":1,"pageSize":5}})'
  - task_id: db-T04-rls-policy
    na: false
    read_method: POST
    read_path_template: /api/run/axarena_customers:listOwned
    assert_field: 'Call twice with distinct Bearer JWTs; each value.rows contains
      only documents owned by the authenticated identity; row sets are disjoint
      and per-user count matches expectation (POST body:
      {"args":{"ns":"{ns}"}})'
  - task_id: db-T05-unique-constraint
    na: true
    na_reason: Convex does not enforce unique constraints at the storage layer;
      duplicate inserts succeed without error, so neither a count-of-1 assertion
      nor a unique-violation error code or message can be produced via the HTTP
      API
  - task_id: db-T06-foreign-key
    na: true
    na_reason: Convex has no foreign-key constraint enforcement; mutations that
      reference non-existent document IDs via v.id() succeed without
      error—referential integrity is not checked at the database level and no
      FK-violation response exists
  - task_id: db-T07-export
    na: true
    na_reason: Convex exposes no REST endpoint to trigger or stream a data export;
      export is available only via CLI (npx convex export) or the dashboard
      download—there is no HTTP API path to assert against
  - task_id: db-T08-schema-migration
    na: false
    read_method: POST
    read_path_template: /api/run/axarena_customers:getOne
    assert_field: "value.doc.status === 'active' and typeof value.doc.status ===
      'string' (POST body: {\"args\":{\"ns\":\"{ns}\"}})"
  - task_id: db-T09-runtime-integration
    na: false
    read_method: POST
    read_path_template: /api/run/axarena:runtimeCheck
    assert_field: 'HTTP 200; response Content-Type: application/json; value.count is
      a number matching expected row count (POST body: {"args":{"ns":"{ns}"}})'
  - task_id: db-T10-backup-restore
    na: true
    na_reason: Convex has no REST API for listing or managing backups or snapshots;
      backups are accessible only through the dashboard UI or CLI (npx convex
      export/import)—no HTTP endpoint exists to assert a backup identifier or
      creation timestamp
