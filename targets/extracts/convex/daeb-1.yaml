vendor_config:
  base_url: https://{deployment}.convex.cloud
  auth_type: bearer
  auth_env: CONVEX_DEPLOY_KEY
tasks:
  - task_id: db-T01-create-table
    na: true
    na_reason: Convex exposes no public REST endpoint for table listing or schema
      column introspection. Schema is defined in schema.ts (code), and there is
      no /api/tables, /api/schema, or equivalent route in the documented HTTP
      API.
    checks: []
  - task_id: db-T02-insert-rows
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 100
        description: body {path:'customers:countAll',args:{ns:'{ns}'}}; function returns
          total document count in axarena_customers_{ns}
      - read_method: POST
        read_path_template: /api/query
        assert_field: value.email
        expected: probe-1@{ns}.example.com
        description: body
          {path:'customers:getByEmail',args:{ns:'{ns}',email:'probe-1@{ns}.example.com'}};
          sampled row has expected email field
  - task_id: db-T03-query-pattern
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 11
        description: body
          {path:'customers:countByEmailPrefix',args:{ns:'{ns}',prefix:'probe-'}};
          function returns integer count of probe-1 + probe-10..probe-19
      - read_method: POST
        read_path_template: /api/query
        assert_field: value.0.email
        expected: probe-1@{ns}.example.com
        description: body
          {path:'customers:pageByEmailPrefix',args:{ns:'{ns}',prefix:'probe-',limit:5,order:'asc'}};
          first item of first page is lowest-ordered email
  - task_id: db-T04-rls-policy
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 50
        description: "Authorization: Bearer {USER_A_JWT}; body
          {path:'customers:myRows',args:{ns:'{ns}'}}; userA sees exactly their
          own 50 rows"
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 50
        description: "Authorization: Bearer {USER_B_JWT}; body
          {path:'customers:myRows',args:{ns:'{ns}'}}; userB sees exactly their
          own 50 rows (distinct from userA's)"
  - task_id: db-T05-unique-constraint
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 1
        description: body
          {path:'customers:countByEmail',args:{ns:'{ns}',email:'<duplicate_email>'}};
          exactly one document exists with that email after attempted re-insert
      - read_method: POST
        read_path_template: /api/mutation
        assert_field: status
        expected: error
        description: Re-attempt duplicate insert via body
          {path:'customers:insert',args:{ns:'{ns}',email:'<duplicate_email>',...}};
          response status is 'error' (application-enforced uniqueness; no
          DB-native error code)
  - task_id: db-T06-foreign-key
    na: true
    na_reason: Convex is a document database with no native foreign-key constraint
      enforcement. Document Id references (v.id()) express relationships but
      referential integrity is not checked by the engine; no FK-violation error
      code exists.
    checks: []
  - task_id: db-T07-export
    na: true
    na_reason: Convex has no public REST endpoint for bulk data export. Export is
      available only via the Convex CLI (npx convex export) or dashboard
      download; there is no streaming or file-download route in the /api/* HTTP
      surface.
    checks: []
  - task_id: db-T08-schema-migration
    na: false
    checks:
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 100
        description: body
          {path:'customers:countByStatus',args:{ns:'{ns}',status:'active'}}; all
          100 existing rows have status='active' after migration
      - read_method: POST
        read_path_template: /api/query
        assert_field: value
        expected: 0
        description: body {path:'customers:countMissingStatus',args:{ns:'{ns}'}}; zero
          rows lack the status field (backfill complete)
  - task_id: db-T09-runtime-integration
    na: false
    checks:
      - read_method: GET
        read_path_template: https://{deployment}.convex.site/runtime/stats?ns={ns}
        assert_field: count
        expected: 100
        description: HTTP action at .convex.site public URL; response JSON has top-level
          count equal to total row count
  - task_id: db-T10-backup-restore
    na: true
    na_reason: Convex has no public REST API for listing, inspecting, or
      timestamping backups or snapshots. Backup state is managed internally by
      the Convex platform and is only accessible via the dashboard UI; no
      /api/backups or equivalent route exists.
    checks: []
