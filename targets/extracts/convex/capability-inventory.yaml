  - capability_name: javascript-aggregation-and-count
    title: JavaScript Aggregation and Counting
    family: data-read
    description: Convex does not expose a separate database aggregation language
      for joins, group-by, or counts. Instead, query functions load documents
      and compute counts, averages, and grouped results in JavaScript against a
      consistent snapshot.
    resource_kind: row
    operation_kind: read
    surfaces_documented:
      - api
      - sdk
    support_type: idiomatic-pattern
    evidence:
      - doc_url: https://docs.convex.dev/database/reading-data
        quote: there is no specific query language for complex logic like a join, an
          aggregation, or a group by.
      - doc_url: https://docs.convex.dev/database/reading-data
        quote: Instead, you can write the complex logic in JavaScript!
    extraction_provenance:
      source: official-docs
      extracted_at: 2026-07-02T00:00:00.000Z
      extractor: llm-capability-inventory-v1
  - capability_name: snapshot-consistent-query-reads
    title: Snapshot-Consistent Query Reads
    family: integrity
    description: Every query reads from one logical database snapshot, so
      concurrent writes do not change results mid-query. This consistency model
      underpins safe JavaScript-side joins and aggregations.
    resource_kind: function
    operation_kind: read
    surfaces_documented:
      - api
      - sdk
    support_type: native
    evidence:
      - doc_url: https://docs.convex.dev/functions/query-functions
        quote: All database reads inside a single query call are performed at the
          same logical timestamp.
      - doc_url: https://docs.convex.dev/functions/query-functions
        quote: Concurrent writes do not affect the query results.
    extraction_provenance:
      source: official-docs
      extracted_at: 2026-07-02T00:00:00.000Z
      extractor: llm-capability-inventory-v1
