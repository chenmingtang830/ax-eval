        quote: The Convex database provides a relational data model, stores JSON-like
          documents, and can be used with or without a schema.
      - doc_url: https://docs.convex.dev/database/overview
        quote: Each table springs into existence as soon as you add the first
          document to it.
    extraction_provenance:
