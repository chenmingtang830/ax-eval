  - capability_name: acid-transactions
    title: ACID Transactions (Mutations)
    family: compute
    description: "Every mutation function runs as a fully atomic, serializable
      transaction: reads see a consistent snapshot and all writes either commit
      together or not at all if an error is thrown."
    resource_kind: function
    operation_kind: backup
    surfaces_documented:
      - api
      - sdk
      - cli
    support_type: unknown
    evidence:
      - doc_url: https://docs.convex.dev/functions/mutation-functions
        quote: All database writes get committed together. If the mutation writes some
          data to the database, but later throws an error, no data is actually
          written to the database.
    extraction_provenance:
      source: official-docs
      extracted_at: 2026-07-01T08:44:26.560Z
