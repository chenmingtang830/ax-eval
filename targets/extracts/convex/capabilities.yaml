  - capability_name: snapshot-isolation-reads
    title: Snapshot-Isolated Query Reads
    family: data-read
    description: All database reads inside a single query execute at the same
      logical timestamp, so concurrent writes never affect mid-query results,
      giving queries repeatable-read semantics.
    resource_kind: backup
    operation_kind: search
    surfaces_documented:
