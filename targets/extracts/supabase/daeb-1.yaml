vendor: Supabase
category: database
slug: supabase
suite_name: DAEB-1
extracted_at: 2026-06-30T22:34:46.903Z
vendor_config:
  base_url: https://{project_ref}.supabase.co/rest/v1
  auth_type: api-key
  auth_header: apikey
  auth_env: SUPABASE_SERVICE_ROLE_KEY
tasks:
  - task_id: db-T01-create-table
    na: false
    read_method: GET
    read_path_template: /
    assert_field: response body is OpenAPI 2.0 JSON;
      definitions["axarena_customers_{ns}"].properties contains exactly the
      three named column keys, each with the correct 'type' and optional
      'format' values
  - task_id: db-T02-insert-rows
    na: false
    read_method: GET
    read_path_template: /axarena_customers_{ns}?select=*&limit=0
    assert_field: "send Prefer: count=exact header; assert Content-Range response
      header value is */100; then GET
      /axarena_customers_{ns}?email=eq.{sampled_email}&limit=1 and assert
      response[0] contains all expected field keys with correct value types"
  - task_id: db-T03-query-pattern
    na: false
    read_method: GET
    read_path_template: /axarena_customers_{ns}?email=like.probe-1*&order=email.asc&limit=5
    assert_field: "send Prefer: count=exact header; assert Content-Range total ==
      11; assert response array length == 5; assert the 5 returned email values
      are the 5 lexicographically lowest among all 11 pattern matches"
  - task_id: db-T04-rls-policy
    na: false
    read_method: GET
    read_path_template: /axarena_customers_{ns}?select=*
    assert_field: "call with Authorization: Bearer {user1_jwt} plus apikey header;
      assert every row's owner_id == user1_id and Prefer: count=exact
      Content-Range matches user1 expected count; repeat identically with
      {user2_jwt}; assert no row in user2 response has owner_id == user1_id and
      counts are disjoint"
  - task_id: db-T05-unique-constraint
    na: false
    read_method: GET
    read_path_template: /axarena_customers_{ns}?email=eq.{duplicate_email}
    assert_field: response array length == 1; agent's reported INSERT error response
      body contains PostgreSQL error code '23505' or message substring 'unique'
      or 'duplicate key'
  - task_id: db-T06-foreign-key
    na: false
    read_method: GET
    read_path_template: /axarena_orders_{ns}?select=*,axarena_customers_{ns}(*)&id=eq.{valid_order_id}
    assert_field: agent's reported invalid-insert POST error body contains code
      '23503' or message substring 'foreign key'; valid-order GET
      response[0].axarena_customers_{ns} is a non-null object containing the
      expected customer fields
  - task_id: db-T07-export
    na: false
    read_method: GET
    read_path_template: /axarena_customers_{ns}?select=*
    assert_field: response array length == 100; each element contains all expected
      field keys; if agent reported a file path instead, read that file and
      assert 100 records each with the expected fields present
  - task_id: db-T08-schema-migration
    na: false
    read_method: GET
    read_path_template: /axarena_customers_{ns}?status=neq.active&select=id
    assert_field: "send Prefer: count=exact; assert HTTP 200 (confirms column
      exists, else PostgREST returns 400); assert Content-Range total == 0
      meaning all rows have status='active'; corroborate column type by checking
      definitions[\"axarena_customers_{ns}\"].properties.status in GET /
      response"
  - task_id: db-T09-runtime-integration
    na: false
    read_method: GET
    read_path_template: https://{project_ref}.supabase.co/functions/v1/{function_name}
    assert_field: response Content-Type contains application/json; response body is
      valid JSON; the count field (or equivalent top-level key) equals the
      expected integer row count
  - task_id: db-T10-backup-restore
    na: true
    na_reason: Supabase provides no REST endpoint to trigger an on-demand backup;
      backups are automated on a fixed schedule (daily on Pro, weekly on Free)
      with no sub-minute granularity. There is no REST call that can assert a
      backup identifier created within the last 60 seconds.
    read_method: GET
