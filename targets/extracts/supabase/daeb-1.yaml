  - task_id: db-T01-create-table
    na: false
    approach: Connect to the project's PostgreSQL instance via the direct database
      URL (or Supabase Management API /v1/projects/{ref}/database/query) and
      execute SQL DDL to create the table with uuid primary key, unique email,
      and timestamptz created_at defaulting to now().
    mechanism: PostgreSQL DDL via direct pg client or Supabase Management API
    snippet: >-
      import { Client } from 'pg';

      const client = new Client({ connectionString: process.env.SUPABASE_DB_URL
      });

      await client.connect();

      await client.query(`
        CREATE TABLE axarena_customers_ns (
          id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          email TEXT UNIQUE NOT NULL,
          created_at TIMESTAMPTZ DEFAULT now()
        )
      `);

      await client.end();
    oracle_approach: Query SELECT column_name, data_type FROM
      information_schema.columns WHERE table_name = 'axarena_customers_ns' ORDER
      BY ordinal_position; assert exactly three rows with names id (uuid), email
      (text), created_at (timestamp with time zone).
  - task_id: db-T02-insert-rows
    na: false
    approach: Use the supabase-js SDK to bulk-insert 100 rows in a single .insert()
      call, passing an array of objects with unique emails probe-1@... through
      probe-100@... and deterministic created_at timestamps (e.g., epoch + n
      seconds).
    mechanism: supabase-js SDK .insert() via PostgREST
    snippet: >-
      import { createClient } from '@supabase/supabase-js';

      const supabase = createClient(process.env.SUPABASE_URL,
      process.env.SUPABASE_SERVICE_ROLE_KEY);

      const rows = Array.from({ length: 100 }, (_, i) => ({
        email: `probe-${i + 1}@axarena-ns.test`,
        created_at: new Date(Date.UTC(2024, 0, 1, 0, 0, i)).toISOString()
      }));

      const { error } = await
      supabase.from('axarena_customers_ns').insert(rows);

      if (error) throw error;
    oracle_approach: "Call supabase.from('axarena_customers_ns').select('*', {
      count: 'exact', head: true }) and assert count === 100. Fetch the row with
      email = 'probe-1@axarena-ns.test' and assert it has id, email, and
      created_at fields."
  - task_id: db-T03-query-pattern
    na: false
    approach: Use supabase-js .like() for LIKE pattern matching and .range(from, to)
      for offset-based pagination, ordering by created_at ascending. Fetch page
      1 with .range(0, 4) and page 2 with .range(5, 9).
    mechanism: supabase-js SDK PostgREST LIKE filter + range pagination
    snippet: |-
      const pattern = 'probe-1%@axarena-ns.test';
      const { data: page1 } = await supabase
        .from('axarena_customers_ns')
        .select('*')
        .like('email', pattern)
        .order('created_at', { ascending: true })
        .range(0, 4);
      const { data: page2 } = await supabase
        .from('axarena_customers_ns')
        .select('*')
        .like('email', pattern)
        .order('created_at', { ascending: true })
        .range(5, 9);
    oracle_approach: "Fetch all matching rows via .like('email',
      'probe-1%@axarena-ns.test').select('*', { count: 'exact' }) and assert
      count === 11 (probe-1, probe-10 through probe-19). Verify page1[0].email
      is the email with the smallest created_at among the 11 matches."
  - task_id: db-T04-rls-policy
    na: false
    approach: Add an owner UUID column to the table, enable PostgreSQL Row Level
      Security via ALTER TABLE, and create a SELECT policy using auth.uid() so
      each authenticated user can only read rows where owner matches their JWT
      subject. Insert test rows with distinct owner UUIDs matching two test
      users.
    mechanism: PostgreSQL Row Level Security (RLS) via SQL DDL + Supabase Auth JWT
    snippet: |-
      -- Execute via pg client or Management API
      ALTER TABLE axarena_customers_ns ADD COLUMN IF NOT EXISTS owner UUID;
      ALTER TABLE axarena_customers_ns ENABLE ROW LEVEL SECURITY;
      CREATE POLICY "users_read_own_rows"
        ON axarena_customers_ns
        FOR SELECT
        USING (owner = auth.uid());

      -- Assign owners to existing rows for testing
      UPDATE axarena_customers_ns
        SET owner = '<user_a_uid>'
        WHERE email LIKE 'probe-1%@axarena-ns.test';
      UPDATE axarena_customers_ns
        SET owner = '<user_b_uid>'
        WHERE email NOT LIKE 'probe-1%@axarena-ns.test';
    oracle_approach: Obtain JWT tokens for user A and user B via
      supabase.auth.signInWithPassword(). Query axarena_customers_ns as each
      user using the anon key + user session. Assert user A sees only their
      rows, user B sees only their rows, and neither sees the other's rows.
  - task_id: db-T05-unique-constraint
    na: false
    approach: The email column was defined UNIQUE in T01. Attempt to insert a row
      with a pre-existing email via supabase-js and inspect the returned error.
      Assert the PostgreSQL error code is '23505' (unique_violation).
    mechanism: PostgreSQL UNIQUE constraint enforced via PostgREST, error surfaced
      by supabase-js SDK
    snippet: |-
      const { error } = await supabase
        .from('axarena_customers_ns')
        .insert({ email: 'probe-1@axarena-ns.test' });
      // error.code === '23505'
      // error.message contains 'duplicate key value violates unique constraint'
      console.log(error.code, error.message);
    oracle_approach: After the failed insert, query SELECT count(*) FROM
      axarena_customers_ns WHERE email = 'probe-1@axarena-ns.test' and assert
      count === 1. Confirm error.code === '23505'.
  - task_id: db-T06-foreign-key
    na: false
    approach: Execute SQL DDL to create axarena_orders_ns with a customer_id UUID
      column that REFERENCES axarena_customers_ns(id). Insert one valid order
      using an existing customer's id. Then attempt an insert with a
      non-existent customer_id (all-zeros UUID) and capture the FK violation
      error.
    mechanism: PostgreSQL FOREIGN KEY constraint via SQL DDL; CRUD via supabase-js SDK
    snippet: >-
      // DDL via pg client

      await client.query(`
        CREATE TABLE axarena_orders_ns (
          id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          customer_id UUID REFERENCES axarena_customers_ns(id),
          amount NUMERIC
        )
      `);


      // Valid insert

      const { data: cust } = await
      supabase.from('axarena_customers_ns').select('id').limit(1).single();

      await supabase.from('axarena_orders_ns').insert({ customer_id: cust.id,
      amount: 99.99 });


      // FK violation

      const { error } = await supabase.from('axarena_orders_ns')
        .insert({ customer_id: '00000000-0000-0000-0000-000000000000', amount: 1 });
      console.log(error.code); // '23503'
    oracle_approach: Count rows in axarena_orders_ns and assert exactly 1. Assert
      error.code === '23503'. Fetch the valid order and assert its customer_id
      matches the existing customer's id.
  - task_id: db-T07-export
    na: false
    approach: Fetch all rows from axarena_customers_ns via supabase-js .select('*')
      (using service role key to bypass RLS) and write the result array to a
      JSON file on disk. Alternatively, use the PostgreSQL COPY command via psql
      to export as CSV.
    mechanism: supabase-js SDK .select('*') + Node.js fs.writeFileSync
    snippet: >-
      import fs from 'fs';

      const { data, error } = await supabase
        .from('axarena_customers_ns')
        .select('*');
      if (error) throw error;

      fs.writeFileSync('axarena_customers_export.json', JSON.stringify(data,
      null, 2));

      console.log(`Exported ${data.length} rows to
      axarena_customers_export.json`);
    oracle_approach: Read and JSON.parse the exported file; assert the array length
      === 100 and that every object contains keys id, email, and created_at.
  - task_id: db-T08-schema-migration
