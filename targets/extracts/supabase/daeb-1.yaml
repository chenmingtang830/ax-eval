    approach: Use the Supabase CLI to create a timestamped migration file containing
      ALTER TABLE ... ADD COLUMN status TEXT DEFAULT 'active', then apply with
      'supabase db push'. Alternatively, execute the ALTER TABLE directly via
      the pg client or Supabase Management API for projects without local CLI
      setup.
    mechanism: Supabase CLI migrations (supabase migration new + supabase db push)
      or direct ALTER TABLE via pg client
    snippet: >-
      # CLI approach

      supabase migration new add_status_column

      # Contents written to
      supabase/migrations/<timestamp>_add_status_column.sql:

      # ALTER TABLE axarena_customers_ns ADD COLUMN status TEXT DEFAULT
      'active';

      supabase db push


      # Or directly via pg client:

      await client.query("ALTER TABLE axarena_customers_ns ADD COLUMN IF NOT
      EXISTS status TEXT DEFAULT 'active'");
    oracle_approach: Query SELECT column_name, column_default FROM
      information_schema.columns WHERE table_name = 'axarena_customers_ns' AND
      column_name = 'status'; assert one row with column_default containing
      'active'. Then SELECT count(*) FROM axarena_customers_ns WHERE status =
      'active'; assert count === 100.
  - task_id: db-T09-runtime-integration
    na: false
    approach: Create a Supabase Edge Function (Deno/TypeScript) at
      supabase/functions/count-customers/index.ts that uses the supabase-js
      client with the service role key to count rows in axarena_customers_ns and
      returns JSON. Deploy with 'supabase functions deploy count-customers',
      then invoke via the project's functions URL.
    mechanism: Supabase Edge Functions (Deno runtime) + supabase-js SDK
    snippet: >-
      // supabase/functions/count-customers/index.ts

      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      Deno.serve(async (_req) => {
        const supabase = createClient(
          Deno.env.get('SUPABASE_URL'),
          Deno.env.get('SUPABASE_SERVICE_ROLE_KEY')
        );
        const { count, error } = await supabase
          .from('axarena_customers_ns')
          .select('*', { count: 'exact', head: true });
        if (error) return new Response(JSON.stringify({ error: error.message }), { status: 500 });
        return new Response(JSON.stringify({ count }), {
          headers: { 'Content-Type': 'application/json' }
        });
      });


      // Deploy:

      // supabase functions deploy count-customers

      // Invoke:

      // curl https://<ref>.supabase.co/functions/v1/count-customers \

      //   -H 'Authorization: Bearer <anon_key>'
    oracle_approach: HTTP GET the deployed function URL with the anon key
      Authorization header; parse the JSON response body and assert
      response.count === 100 (or the current row count verified independently).
  - task_id: db-T10-backup-restore
    na: false
    approach: "Use the Supabase Management API to list database backups for the
      project via GET /v1/projects/{ref}/database/backups, authenticating with a
      personal access token. Report the most recent backup's ID and inserted_at
      timestamp. On Pro/Team plans, PITR is continuous; on Free plans, one daily
      backup is retained. Note: triggering on-demand backups programmatically is
      only available on Pro/Team plans via the dashboard or support; the agent
      lists existing automated backups."
    mechanism: Supabase Management API GET /v1/projects/{ref}/database/backups
    snippet: |-
      const res = await fetch(
        `https://api.supabase.com/v1/projects/${projectRef}/database/backups`,
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      const body = await res.json();
      const backups = body.backups ?? body;
      const latest = [...backups].sort((a, b) =>
        new Date(b.inserted_at) - new Date(a.inserted_at)
      )[0];
      console.log('Backup ID:', latest.id);
      console.log('Created at:', latest.inserted_at);
    oracle_approach: Re-call GET /v1/projects/{ref}/database/backups and assert the
      agent-reported backup ID appears in the list with an inserted_at value.
      For PITR-enabled projects, verify the status field indicates a completed
      backup.
