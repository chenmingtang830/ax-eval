vendor: Supabase
category: database
slug: supabase
suite_name: DAEB-1
extracted_at: 2026-07-01T01:04:15.391Z
vendor_config:
  base_url: https://{project_ref}.supabase.co
  auth_type: bearer
  auth_header: Authorization
  auth_env: SUPABASE_SERVICE_ROLE_KEY
tasks:
  - task_id: db-T01-create-table
    na: false
    checks:
      - read_method: GET
        read_path_template: /rest/v1/
        assert_field: definitions.axarena_customers_{ns}.properties.id.type
        expected: integer
        description: id column present in PostgREST OpenAPI schema
      - read_method: GET
        read_path_template: /rest/v1/
        assert_field: definitions.axarena_customers_{ns}.properties.email.format
        expected: text
        description: email column present with text format
      - read_method: GET
        read_path_template: /rest/v1/
        assert_field: definitions.axarena_customers_{ns}.properties.created_at.format
        expected: timestamp with time zone
        description: created_at column present with timestamptz format
  - task_id: db-T02-insert-rows
    na: false
    checks:
      - read_method: GET
        read_path_template: /rest/v1/axarena_customers_{ns}?select=count()
        assert_field: 0.count
        expected: 100
        description: table contains exactly 100 rows
      - read_method: GET
        read_path_template: /rest/v1/axarena_customers_{ns}?email=eq.probe-1%40test.com&select=id,email,created_at
        assert_field: 0.email
        expected: probe-1@test.com
        description: sampled row has expected email and all three fields present
  - task_id: db-T03-query-pattern
    na: false
    checks:
      - read_method: GET
        read_path_template: /rest/v1/axarena_customers_{ns}?email=like.probe-1*&select=count()
        assert_field: 0.count
        expected: 11
        description: exactly 11 rows match probe-1* email pattern
      - read_method: GET
        read_path_template: /rest/v1/axarena_customers_{ns}?email=like.probe-1*&order=email.asc&limit=5&offset=0&select=email
        assert_field: 0.email
        expected: probe-10@test.com
        description: first of page-1 ascending is probe-10 (digits sort before @ in
          ASCII collation)
  - task_id: db-T04-rls-policy
    na: false
    checks:
      - read_method: GET
        read_path_template: /rest/v1/axarena_customers_{ns}?select=count()
        assert_field: 0.count
        expected: 50
        description: "user-1 (SUPABASE_USER1_JWT): sees exactly their own 50 rows"
      - read_method: GET
        read_path_template: /rest/v1/axarena_customers_{ns}?select=count()
        assert_field: 0.count
        expected: 50
        description: "user-2 (SUPABASE_USER2_JWT): sees exactly their own 50 rows"
  - task_id: db-T05-unique-constraint
    na: false
    checks:
      - read_method: GET
        read_path_template: /rest/v1/axarena_customers_{ns}?email=eq.{dup_email}&select=count()
        assert_field: 0.count
        expected: 1
        description: exactly 1 row with the duplicate email after rejected insert
      - read_method: POST
        read_path_template: /rest/v1/axarena_customers_{ns}
        assert_field: code
        expected: "23505"
        description: repeated duplicate insert response carries Postgres
          unique-violation error code
  - task_id: db-T06-foreign-key
    na: false
    checks:
      - read_method: POST
        read_path_template: /rest/v1/axarena_orders_{ns}
        assert_field: code
        expected: "23503"
        description: insert with nonexistent customer_id returns Postgres FK-violation
          error code
      - read_method: GET
        read_path_template: /rest/v1/axarena_orders_{ns}?id=eq.{valid_order_id}&select=customer_id
        assert_field: 0.customer_id
        expected: "{valid_customer_id}"
        description: valid order's customer_id matches the referenced customer
  - task_id: db-T07-export
    na: false
    checks:
      - read_method: GET
        read_path_template: /rest/v1/axarena_customers_{ns}?select=count()
        assert_field: 0.count
        expected: 100
        description: table contains exactly 100 exportable records
      - read_method: GET
        read_path_template: /rest/v1/axarena_customers_{ns}?email=eq.probe-50%40test.com&select=id,email,created_at
        assert_field: 0.email
        expected: probe-50@test.com
        description: mid-range record present with all expected fields
  - task_id: db-T08-schema-migration
    na: false
    checks:
      - read_method: GET
        read_path_template: /rest/v1/
        assert_field: definitions.axarena_customers_{ns}.properties.status.type
        expected: string
        description: status column present in PostgREST OpenAPI schema
      - read_method: GET
        read_path_template: /rest/v1/axarena_customers_{ns}?status=neq.active&select=count()
        assert_field: 0.count
        expected: 0
        description: zero existing rows have status other than active
  - task_id: db-T09-runtime-integration
    na: false
    checks:
      - read_method: GET
        read_path_template: /functions/v1/axarena_{ns}
        assert_field: count
        expected: 100
        description: deployed edge function returns JSON with correct customer count
  - task_id: db-T10-backup-restore
    na: false
    checks:
      - read_method: GET
        read_path_template: https://api.supabase.com/v1/projects/{project_ref}/database/backups
        assert_field: backups.0.id
        expected: "{backup_id}"
        description: "agent's reported backup id present in management API list
          (auth_env: SUPABASE_ACCESS_TOKEN)"
      - read_method: GET
        read_path_template: https://api.supabase.com/v1/projects/{project_ref}/database/backups
        assert_field: backups.0.status
        expected: COMPLETED
        description: most recent backup entry has completed status
