  - capability_name: encryption-at-rest
    title: Bring-Your-Own-Key (BYOK) Encryption
    family: integrity
    description: Encrypt each database file and WAL at the page level (4 KiB pages,
      unique nonce per page) using a key you supply and control — AES-GCM,
      ChaCha20-Poly1305, or AEGIS ciphers. Turso never stores the key.
    resource_kind: resource
    operation_kind: operate
    surfaces_documented:
      - api
      - sdk
      - cli
    support_type: unknown
    evidence:
      - doc_url: https://docs.turso.tech/cloud/encryption
        quote: You hold the keys. Each database can be encrypted with its own unique key
