  - capability_name: offline-sync
    title: Offline-First Push/Pull Sync
    family: core-operations
    description: Applications write locally without connectivity and explicitly
      push() / pull() changes to/from Turso Cloud. Conflict resolution uses
      last-push-wins; partial sync lets you sync subsets of data. Suitable for
      mobile and edge devices.
    resource_kind: resource
    operation_kind: operate
    surfaces_documented:
      - api
      - sdk
      - cli
    support_type: unknown
    evidence:
      - doc_url: https://docs.turso.tech/sync/usage
        quote: Applications can accept writes without internet connectivity. Changes
