  - capability_name: concurrent-writes-mvcc
    title: Concurrent Writes via MVCC
    family: core-operations
    description: Enable Multi-Version Concurrency Control so multiple connections
      can write simultaneously using BEGIN CONCURRENT. Transactions on
      non-overlapping rows proceed without conflict; overlapping writes get a
      conflict error and must retry.
    resource_kind: resource
    operation_kind: operate
    surfaces_documented:
      - api
      - sdk
      - cli
    support_type: unknown
    evidence:
      - doc_url: https://docs.turso.tech/tursodb/concurrent-writes
        quote: If two transactions modify the same data, one will receive a conflict
          error and must roll back and retry. Transactions that write to
          non-overlapping data proceed without conflict.
    extraction_provenance:
      source: official-docs
      extracted_at: 2026-07-01T08:45:02.612Z
      extractor: legacy-capabilities-normalizer-v1
  - capability_name: transactions
    title: Explicit Transactions with Snapshot Isolation
    family: core-operations
    description: Standard BEGIN/COMMIT/ROLLBACK with DEFERRED, IMMEDIATE, and
      EXCLUSIVE modes. BEGIN CONCURRENT provides optimistic snapshot-isolation
      transactions for concurrent workloads; SAVEPOINT and nested transactions
      are not supported.
    resource_kind: backup
    operation_kind: backup
    surfaces_documented:
      - api
      - sdk
      - cli
    support_type: unknown
    evidence:
      - doc_url: https://docs.turso.tech/sql-reference/statements/transactions
        quote: BEGIN CONCURRENT… transactions operate on database snapshots taken at
          start time. If a write-write conflict is detected, the COMMIT fails
          and the transaction must be rolled back and retried.
    extraction_provenance:
      source: official-docs
      extracted_at: 2026-07-01T08:45:02.612Z
      extractor: legacy-capabilities-normalizer-v1
