        assert_field: results.0.response.result.rows.0.0.value
        expected: "1"
        description: sql=SELECT COUNT(*) FROM axarena_customers_{ns} WHERE
          email='{duplicate_email}' — duplicate email is stored exactly once
      - read_method: POST
        read_path_template: /v2/pipeline
        assert_field: results.0.type
