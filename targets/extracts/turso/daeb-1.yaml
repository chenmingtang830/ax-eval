  - task_id: db-T03-query-pattern
    na: false
    checks:
      - read_method: POST
        read_path_template: /v2/pipeline
        assert_field: results.0.response.result.rows.0.0.value
        expected: "11"
        description: sql=SELECT COUNT(*) FROM axarena_customers_{ns} WHERE email LIKE
          'probe-1%' — exactly 11 rows (probe-1, probe-10…probe-19)
      - read_method: POST
        read_path_template: /v2/pipeline
        assert_field: results.0.response.result.rows.0.0.value
        expected: "5"
        description: sql=SELECT COUNT(*) FROM (SELECT email FROM axarena_customers_{ns}
          WHERE email LIKE 'probe-1%' ORDER BY email LIMIT 5) — page-1 window
          (lowest-ordered 5) has exactly 5 rows
  - task_id: db-T04-rls-policy
    na: true
    na_reason: Turso is built on libSQL/SQLite, which has no native row-level
      security mechanism. There is no CREATE POLICY, per-user row filter, or
      equivalent server-enforced RLS feature anywhere in Turso's documented
      platform API.
    checks: []
  - task_id: db-T05-unique-constraint
    na: false
    checks:
