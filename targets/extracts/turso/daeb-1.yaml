vendor: Turso
category: database
slug: turso
suite_name: DAEB-1
extracted_at: 2026-06-30T22:42:12.185Z
vendor_config:
  base_url: https://{databaseName}-{organizationSlug}.turso.io
  auth_type: bearer
  auth_env: TURSO_AUTH_TOKEN
tasks:
  - task_id: db-T01-create-table
    na: false
    read_method: POST
    read_path_template: /v2/pipeline
    assert_field: "POST body:
      {\"requests\":[{\"type\":\"execute\",\"stmt\":{\"sql\":\"PRAGMA
      table_info('axarena_customers_{ns}')\"}}]}; assert
      results[0].response.rows contains exactly 3 entries; assert entries
      include name='id', name='email', and the third named column in their
      respective [cid,name,type,notnull,dflt_value,pk] positions"
  - task_id: db-T02-insert-rows
    na: false
    read_method: POST
    read_path_template: /v2/pipeline
    assert_field: 'POST body: {"requests":[{"type":"execute","stmt":{"sql":"SELECT
      COUNT(*) FROM
      axarena_customers_{ns}"}},{"type":"execute","stmt":{"sql":"SELECT * FROM
      axarena_customers_{ns} WHERE
      email=?","args":[{"type":"text","value":"{expected_email}"}]}}]}; assert
      results[0].response.rows[0][0].value=100; assert
      results[1].response.rows[0] is non-empty with cols matching [id, email,
      <third_col>]'
  - task_id: db-T03-query-pattern
    na: false
    read_method: POST
    read_path_template: /v2/pipeline
    assert_field: "POST body:
      {\"requests\":[{\"type\":\"execute\",\"stmt\":{\"sql\":\"SELECT COUNT(*)
      FROM axarena_customers_{ns} WHERE email LIKE
      'probe-%'\"}},{\"type\":\"execute\",\"stmt\":{\"sql\":\"SELECT email FROM
      axarena_customers_{ns} WHERE email LIKE 'probe-%' ORDER BY email LIMIT 5
      OFFSET 0\"}}]}; assert results[0].response.rows[0][0].value=11; assert
      results[1].response.rows has 5 entries equal to the 5 lexicographically
      lowest values from {probe-1, probe-10, probe-11, probe-12, probe-13,
      probe-14, probe-15, probe-16, probe-17, probe-18, probe-19}"
  - task_id: db-T04-rls-policy
    na: true
    na_reason: SQLite/libSQL has no native row-level security mechanism; Turso
      exposes no RLS API — tenant isolation must be enforced at the application
      layer or via separate databases per tenant
    read_method: GET
  - task_id: db-T05-unique-constraint
    na: false
    read_method: POST
    read_path_template: /v2/pipeline
    assert_field: "POST body:
      {\"requests\":[{\"type\":\"execute\",\"stmt\":{\"sql\":\"SELECT COUNT(*)
      FROM axarena_customers_{ns} WHERE
      email=?\",\"args\":[{\"type\":\"text\",\"value\":\"{duplicate_email}\"}]}\
      },{\"type\":\"execute\",\"stmt\":{\"sql\":\"INSERT INTO
      axarena_customers_{ns} (email) VALUES
      (?)\",\"args\":[{\"type\":\"text\",\"value\":\"{duplicate_email}\"}]}}]};
      assert results[0].response.rows[0][0].value=1; assert
      results[1].type='error' and results[1].error.message contains 'UNIQUE
      constraint failed'"
  - task_id: db-T06-foreign-key
    na: false
    read_method: POST
    read_path_template: /v2/pipeline
    assert_field: "POST body:
      {\"requests\":[{\"type\":\"execute\",\"stmt\":{\"sql\":\"PRAGMA
      foreign_keys=ON\"}},{\"type\":\"execute\",\"stmt\":{\"sql\":\"INSERT INTO
      axarena_orders_{ns} (customer_id) VALUES
      (2147483647)\"}},{\"type\":\"execute\",\"stmt\":{\"sql\":\"SELECT o.id,
      o.customer_id, c.email FROM axarena_orders_{ns} o JOIN
      axarena_customers_{ns} c ON o.customer_id=c.id WHERE
      o.id=?\",\"args\":[{\"type\":\"integer\",\"value\":\"{valid_order_id}\"}]\
      }}]}; assert results[1].type='error' and results[1].error.message contains
      'FOREIGN KEY constraint failed'; assert results[2].response.rows[0] is
      non-empty with o.customer_id matching an existing c.id"
  - task_id: db-T07-export
    na: false
    read_method: GET
    read_path_template: /dump
    assert_field: Response body is a plain-text SQL dump; count occurrences of
      'INSERT INTO axarena_customers_{ns}' = 100; each INSERT statement lists
      the expected column names (id, email, <third_col>) in the column list
  - task_id: db-T08-schema-migration
    na: false
    read_method: POST
    read_path_template: /v2/pipeline
    assert_field: "POST body:
      {\"requests\":[{\"type\":\"execute\",\"stmt\":{\"sql\":\"PRAGMA
      table_info('axarena_customers_{ns}')\"}},{\"type\":\"execute\",\"stmt\":{\
      \"sql\":\"SELECT COUNT(*) FROM axarena_customers_{ns} WHERE status IS NULL
      OR status != 'active'\"}}]}; assert results[0].response.rows contains an
      entry with name='status' and type in ['TEXT','VARCHAR']; assert
      results[1].response.rows[0][0].value=0"
  - task_id: db-T09-runtime-integration
    na: true
    na_reason: Turso does not provide serverless or edge function deployment; there
      is no vendor-hosted function runtime or invocation API — compute must be
      deployed separately on a platform that connects to Turso as a database
    read_method: GET
  - task_id: db-T10-backup-restore
    na: false
    read_method: GET
    read_path_template: https://api.turso.tech/v1/organizations/{organizationSlug}/databases/{agentReportedDatabaseName}
    assert_field: "Use Authorization: Bearer {TURSO_API_TOKEN} (platform token, not
      DB token); assert HTTP 200; assert
      response.database.name={agent_reported_identifier}; assert
      response.database.created_at parses as an ISO-8601 timestamp within 60
      seconds of the restore operation time; note: Turso PITR materializes as a
      new named database — 'backups' are enumerated via the databases list
      endpoint"
