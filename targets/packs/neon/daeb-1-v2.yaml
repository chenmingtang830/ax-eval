  - id: db-T07-row-level-security
    title: "T07: Restrict row-level read/write access to a specific identity"
    prompt: "Create a table/collection named `axarena_customers_{ns}` with at least
      one column identifying the owning identity (e.g. `owner_id`) plus a
      `notes` text field. Insert two rows: one owned by identity A and one owned
      by identity B (create two real, distinct identities via the platform's
      actual authentication/user system — e.g. sign up two real users via its
      auth API/SDK — and obtain each identity's genuine signed access
      token/credential; do not fabricate a placeholder string as a stand-in for
      a real token). Configure the platform's idiomatic per-row access-control
      mechanism so that: (1) a request authenticated as identity A can read and
      update/write only the row where `owner_id` = A, and cannot read or modify
      the row owned by B; (2) a request authenticated as identity B can read and
      update/write only its own row and cannot read or modify A's row; (3)
      requests using an unrestricted/administrative credential (not scoped to
      either identity) are unaffected by this task and are only used for
      setup/verification, not as the thing being tested. Use whatever native
      row-level access-control mechanism the platform provides. When done,
      report the table/collection name, the two identity identifiers used, and
      confirmation that each identity's scoped access was tested against both
      its own row and the other identity's row."
    oracles:
      - type: na
        description: Neon's documented RLS mechanism (Neon Authorize) scopes identities
          via JWT tokens validated by the Data API, exposing auth.user_id() to
          Postgres policies -- it does not reduce to a session-level SET LOCAL
          trick on a single superuser sql_query connection. Verifying this
          properly requires per-identity JWTs against the Data API, which the
          sql_query check type cannot express (no auth_field support for SQL
          checks), and the pack's default NEON_DATABASE_URL is a superuser/owner
          connection that bypasses RLS by default.
    difficulty: L2
    allowed_surfaces: []
    na: true
    depends_on: []
    trace: []
  - id: db-T08-role-based-access-control
    title: "T08: Create a restricted-privilege role that can only read one table"
    prompt: "Create two tables: `axarena_orders_{ns}` with an integer `id` column
      and a `total` numeric column, and `axarena_secrets_{ns}` with an integer
      `id` column and a `value` text column. Insert exactly 3 rows into
      `axarena_orders_{ns}` and exactly 3 rows into `axarena_secrets_{ns}`.
      Using your vendor's idiomatic role or scoped-credential mechanism (e.g. a
      SQL role with targeted GRANTs, a custom database role scoped to specific
      actions/resources, or a scoped API key/credential), create a new
      credential named or labeled `axarena_reader_{ns}` that: (1) can SELECT
      from `axarena_orders_{ns}` and read all 3 rows; (2) has no access at all
      to `axarena_secrets_{ns}` — no SELECT, INSERT, UPDATE, or DELETE. Do not
      grant any privileges on `axarena_secrets_{ns}` to the new credential,
      whether by default, inheritance, or wildcard grant. If your mechanism
      produces a directly-connectable credential for the restricted role (e.g. a
      login/password), report a full connection string/credential using it as a
      named field `reader_connection_string`. Using the restricted credential
      itself (not the admin/owner credential), execute a SELECT against
      `axarena_orders_{ns}` and confirm it succeeds and returns all 3 rows, then
      execute a SELECT against `axarena_secrets_{ns}` and confirm it is denied."
    oracles:
      - type: roundtrip
        expected: 3
        description: Verifier connects directly as the restricted role using the
          agent-reported reader_connection_string, confirming it can read all 3
          order rows
        assertField: 0.count
        sqlDialect: postgres
        sqlQuery: SELECT count(*) AS count FROM "axarena_orders_{ns}";
        sqlConnField: reader_connection_string
    difficulty: L2
    allowed_surfaces:
      - api
      - sdk
