        expected: pending
        description: row inserted without status auto-populated to 'pending' by trigger
        assertField: 0.status
        sqlDialect: postgres
        sqlQuery: SELECT status FROM "axarena_events_{ns}" WHERE id = 1;
    difficulty: L2
    allowed_surfaces:
      - api
      - sdk
      - cli
    na: false
    depends_on: []
