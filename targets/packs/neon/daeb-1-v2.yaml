      0.0, 0.0, 0.0], label 'b' -> [0.0, 1.0, 0.0, 0.0], label 'c' -> [0.0, 0.0,
      1.0, 0.0], label 'd' -> [0.0, 0.0, 0.0, 1.0], label 'e' -> [0.9, 0.1, 0.0,
      0.0]. The vendor's idiomatic mechanism for defining a vector-typed column
      and inserting vector data is acceptable (native vector type, JSON array
      cast to vector, or an array field indexed for similarity search). After
      inserting all 5 rows, run a nearest-neighbor / similarity search query
      against the query vector [1.0, 0.0, 0.0, 0.0], requesting the top 2
      nearest results ordered by similarity/distance (closest first). Report the
      labels of the top 2 results in order. If your mechanism for running this
      query is a server-side function/RPC (e.g. because the surface's query
      layer can't order by vector distance directly), define that function to
      take NO parameters — hardcode the fixed query vector [1.0, 0.0, 0.0, 0.0]
      inside the function body, since it's a fixed constant for this task, not a
      runtime input — so the function can be invoked with an empty argument
      list."
    oracles:
