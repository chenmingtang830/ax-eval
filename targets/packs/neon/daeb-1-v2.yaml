  - id: db-T01-vector-similarity-search
    title: "T01: Store embeddings and run a nearest-neighbor similarity query"
    prompt: "Create a table/collection named `axarena_docs_{ns}` with fields: id
      (primary key, vendor's idiomatic choice), label (text), and embedding (a
      vector/embedding field of fixed dimension 4). Insert exactly 5 rows with
