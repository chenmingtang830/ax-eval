  - id: db-T03-server-side-compute
    title: "T03: Define and invoke a server-side function that aggregates data"
    prompt: Create a table named `axarena_sales_{ns}` with columns `id` (integer
      primary key) and `amount` (numeric). Insert exactly 5 rows with amount
