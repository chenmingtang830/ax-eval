        expected: 5
        description: Table still has exactly 5 rows in final cumulative state
        assertField: 0.count
        sqlDialect: postgres
        sqlQuery: SELECT count(*) AS count FROM "axarena_docs_{ns}";
      - type: roundtrip
        expected: a
        description: Top-1 nearest neighbor is label 'a'
        assertField: 0.label
        sqlDialect: postgres
        sqlQuery: SELECT label FROM "axarena_docs_{ns}" ORDER BY embedding <->
          '[1,0,0,0]' LIMIT 1 OFFSET 0;
      - type: roundtrip
        expected: e
        description: Top-2 nearest neighbor is label 'e'
        assertField: 0.label
        sqlDialect: postgres
        sqlQuery: SELECT label FROM "axarena_docs_{ns}" ORDER BY embedding <->
