      idiomatic server-side compute mechanism — that computes the sum of the
      `amount` column across all rows in `axarena_sales_{ns}` and returns that
      sum. The aggregation logic must execute server-side, co-located with the
      data; do not compute the sum client-side and merely store or echo the
      precomputed value. Invoke the function via the vendor's standard call/RPC
      mechanism (not by issuing a raw SELECT SUM() query from the client) and
      report the function's name or identifier as `function_name`, since it may
      be arbitrary.
    oracles:
