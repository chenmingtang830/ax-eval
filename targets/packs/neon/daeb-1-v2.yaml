  - id: db-T05-change-data-capture
    title: "T05: Enable change capture and verify a row-level change event is
      recorded"
    prompt: "Create a new table named `axarena_orders_{ns}` with an `id` column and
      a `status` column. Enable the vendor's idiomatic change-data-capture /
      change-stream / logical-replication mechanism scoped to this table (this
      may involve creating a publication, a changefeed, a change-stream watch, a
      replication slot, or a CDC pragma — whichever is idiomatic for the
      vendor). Then perform exactly one deterministic write: insert a row with
      id=1 and status='new'. Capture or read back the resulting change
      event/record from wherever the change-capture mechanism delivers it (this
      could be a CDC table, a changefeed sink, a change-stream cursor, a
      subscription payload, etc). Report the location or identifier of that
      captured data as `capture_location`, since it varies by vendor. The
      captured event must show the inserted row's data (id=1, status='new') and
      an operation type indicating an insert (e.g. 'insert', 'INSERT', 'c' for
      create, or equivalent). Never name a specific vendor's API/SDK call in
      your response."
    oracles:
      - type: na
        description: Neon's logical replication delivers changes via a
          publisher-subscriber WAL stream consumed through a replication slot;
          there is no durable, SQL-queryable table of delivered CDC events on
          the source database itself. Since verification happens after all 10
          tasks complete (well after any live consumer would have disconnected),
          a single NEON_DATABASE_URL connection cannot re-check a delivered
          change event unless a consumer/sink table was set up as part of the
          task, which is out of scope.
    difficulty: L4
    allowed_surfaces: []
    na: true
