  - id: db-T09-backup-and-restore
    title: "T09: Take an on-demand backup, modify data, then restore from that backup"
    prompt: "In a database or project named `axarena_bkrestore_{ns}`, create a table
      (or equivalent collection) named `axarena_ledger_{ns}` with columns `id`
      INTEGER PRIMARY KEY and `label` TEXT. Insert exactly 4 rows: (1,'seed_1'),
      (2,'seed_2'), (3,'seed_3'), (4,'seed_4'). Once these inserts are
      committed, trigger the vendor's idiomatic on-demand or manual
      backup/snapshot operation (not a scheduled/automatic one) covering this
      database, and record an identifier for that specific backup. After the
      backup completes, make one additional change to `axarena_ledger_{ns}`:
      insert a fifth row (5,'post_backup'). Then restore from the backup
      captured in the previous step — using whichever restore mechanism the
      vendor provides, whether that restores the original database in place or
      produces a new database/branch/instance containing the backup's contents.
      If the restore target is not the original database (i.e., a new branch or
      instance was created), report its identifier in a field named
      `restored_target`; if the restore was applied in place, set
      `restored_target` to the original identifier. On the resulting target,
      confirm that `axarena_ledger_{ns}` contains exactly the 4 seed rows
      (labels `seed_1` through `seed_4`) and that the `post_backup` row is
      absent."
    oracles:
      - type: na
        description: Neon's built-in mechanism is continuous, WAL-based instant
          restore-to-any-timestamp within the retention window, with no discrete
          'take a backup now' action that produces a named backup artifact to
          later restore from. The only 'manual backup' Neon documents is
          exporting via pg_dump to external storage, an out-of-band file not
          restorable via Neon's own restore action. This task's discrete-backup
          framing does not map to Neon's actual continuous-timestamp restore
          model.
    difficulty: L3
    allowed_surfaces: []
    na: true
    depends_on: []
    trace: []
  - id: db-T10-database-triggers
    title: "T10: Create a trigger that auto-populates a field on row insert"
    prompt: Create a table (or equivalent collection) named `axarena_events_{ns}`
      with at least the columns `id` (primary key), `event_type` (text/string),
      and `status` (text/string, nullable). Using the vendor's idiomatic trigger
