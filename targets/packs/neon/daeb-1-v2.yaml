  - id: db-T06-point-in-time-restore
    title: "T06: Restore a table to its exact state at a specific past timestamp"
    prompt: "Create a table named `axarena_snapshot_{ns}` with columns `id` and
      `label`, and insert 3 rows into it. Then record the current timestamp as a
      named field `checkpoint_time`, using whatever mechanism the database
