      full-text/keyword search index on the `body` field. If your mechanism
      requires a separate indexed/generated column (e.g. a tsvector column),
      name that column exactly `body_fts` — this exact name will be used to
      verify your work, regardless of which interface (API/SDK/CLI/MCP) you used
      to build it. Then run a full-text or keyword search query for
      `axarenaquokka` using the vendor's actual full-text search mechanism (not
      a plain substring or LIKE/regex match). The search must return exactly the
      one row whose body contains the word, and no others. Report the matching
      row's `id`.
    oracles:
      - type: roundtrip
        expected: 1
        description: FTS match against the distinctive word returns exactly one row
        assertField: 0.count
        sqlDialect: postgres
        sqlQuery: SELECT count(*) AS count FROM "axarena_articles_{ns}" WHERE
          to_tsvector('english', body) @@ to_tsquery('english',
