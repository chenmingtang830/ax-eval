      a minimum delay before a moment becomes eligible for restore, wait for it
      before proceeding). After recording `checkpoint_time`, insert 2 more rows
      into the table so that 5 rows exist in total. Next, restore or recover the
      database to the exact moment captured by `checkpoint_time`, using
      whichever restore/recovery mechanism the vendor provides. This may create
      a new branch, instance, or database rather than modifying the original in
      place — if so, report its identifier as a named field `restored_target`.
      Always report a named field `restored_connection_string`: a full,
      directly-usable connection string/credential for the resulting target (the
      same one you started with if the restore was applied in place, or the new
      target's own if a new one was created). Finally, confirm that the
      resulting target (the restored one if `restored_target` was produced,
      otherwise the original) contains exactly the original 3 rows and none of
      the 2 rows added after the checkpoint."
    oracles:
      - type: roundtrip
        expected: 3
        description: Verifier connects using the agent-reported
          restored_connection_string (same target if restore was in-place, or
          the new target if one was created) to confirm exactly the 3
          pre-checkpoint rows remain
        assertField: 0.count
        sqlDialect: postgres
        sqlQuery: SELECT count(*) AS count FROM "axarena_snapshot_{ns}";
        sqlConnField: restored_connection_string
    difficulty: L4
