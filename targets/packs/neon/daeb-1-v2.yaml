  - id: db-T04-schema-migration-workflow
    title: "T04: Add a new column to an existing table via a tracked schema migration"
    prompt: Create a table `axarena_products_{ns}` with columns `id` (primary key)
      and `name` (text). Insert exactly 2 rows into it. Then, using the vendor's
      idiomatic VERSIONED or TRACKED schema-change mechanism (e.g. a migration
      file applied through a migration/deploy workflow, a schema-diff-and-apply
      tool, or an equivalent tracked-change process — not a one-off raw ALTER
      TABLE issued with no tracking record), add a new nullable column `price`
      (numeric type) to `axarena_products_{ns}`. Confirm both original rows
      still exist and that `price` is null/absent on them. Additionally, report
      a self-reported named field `migration_id` identifying the
      migration/deploy-request/schema-version record that the tracking mechanism
      itself generated for this change.
    oracles:
      - type: na
        description: Neon's Schema Diff (neon.com/docs/guides/schema-diff, neonctl
          branches schema-diff) is a read-only schema comparison utility, not a
          tracked/versioned migration mechanism -- it compares schemas but does
          not apply DDL, version changes, or produce a migration_id. No
          first-party tracked migration/deploy mechanism exists on Neon;
          applying the actual ALTER TABLE requires raw SQL or a third-party
          tool, outside what the task's named mechanism (a tracked migration
          workflow) provides.
    difficulty: L2
    allowed_surfaces: []
    na: true
