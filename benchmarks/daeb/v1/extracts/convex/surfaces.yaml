cli:
  bin: convex
  install: npm install convex
  docs_url: https://docs.convex.dev/cli/overview
  auth:
    kind: token
    token_env: CONVEX_DEPLOY_KEY
    token_env_aliases: []
    instructions: "Set CONVEX_DEPLOY_KEY to a deploy key scoped to your deployment.
      Generate one with: npx convex deployment token create <name> --save-env.
      In non-interactive shells the CLI will never prompt for login when this
      env var is set."
sdk:
  package: convex
  language: node
  reference_url: https://docs.convex.dev/client/javascript/node
  auth:
    kind: token
    token_env: CONVEX_URL
    token_env_aliases: []
    instructions: Set CONVEX_URL to your deployment URL (e.g.
      https://happy-capybara-849.convex.cloud). The client connects to this URL;
      load it from .env.local in development or set it directly in
      CI/production.
mcp:
  server: npx -y convex@latest mcp start
  transport: stdio
  docs_url: https://docs.convex.dev/ai/convex-mcp-server
  auth:
    kind: token
    token_env: CONVEX_DEPLOY_KEY
    token_env_aliases: []
    instructions: 'Set CONVEX_DEPLOY_KEY to a scoped deploy key for the target
      deployment. Example: CONVEX_DEPLOY_KEY="dev:happy-capybara-849|..." npx -y
      convex@latest mcp start. Without this env var the server falls back to
      global login credentials from npx convex login.'
