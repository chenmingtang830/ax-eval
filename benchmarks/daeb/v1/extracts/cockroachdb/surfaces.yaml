# Optional agent surface adapters for exec-plan (CLI / SDK / MCP only).
# REST API is always the implicit default surface and is intentionally omitted here;
# API auth and base URL come from the vendor oracle extract, not this file.
schema: ax.surface-extract/v1
vendor: Cockroachdb
slug: cockroachdb
extracted_at: 2026-07-08T10:53:37.835Z
extraction_context:
  mode: grounded-doc-crawl
  harness: claude-code
  notes: Grounded doc-crawl surface candidate.
audit_status: candidate
audit_notes:
  - Verify headless auth fields against vendor docs before publication.
  - "Post-extract audit: 2 surface finding(s)."
cli:
  bin: ccloud
  install: brew install cockroachdb/tap/ccloud
  docs_url: https://www.cockroachlabs.com/docs/cockroachcloud/ccloud-get-started
  auth:
    kind: token
    token_env: COCKROACH_API_KEY
    token_env_aliases: []
    instructions: "ccloud interactive login is browser/device-code based. For
      headless/CI automation prefer the Cloud REST API with a service-account
      API key (COCKROACH_API_KEY / Authorization: Bearer). The CLI itself is not
      a fully non-interactive surface."
sdk: null
mcp:
  server: https://cockroachlabs.cloud/mcp
  transport: http
  docs_url: https://www.cockroachlabs.com/docs/cockroachcloud/connect-to-the-cockroachdb-cloud-mcp-server
  auth:
    kind: token
    token_env: COCKROACH_API_KEY
    token_env_aliases: []
    instructions: 'Pass a service account API key as a Bearer token via the
      Authorization header, and also supply the target cluster ID via the
      mcp-cluster-id header. Example Claude Code config: claude mcp add
      cockroachdb-cloud https://cockroachlabs.cloud/mcp --transport http
      --header "Authorization: Bearer {api-key}" --header "mcp-cluster-id:
      {cluster-id}". OAuth 2.1 (PKCE) is also supported for interactive flows.'
