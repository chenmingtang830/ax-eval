schema: ax.vendor-selection-ledger/v1
benchmark: DAEB-1
generated_at: 2026-07-10T00:30:00.000Z
methodology:
  sampling: purposive-stratified
  population: >-
    Developer-facing managed database and backend data platforms that an agent
    can operate in a repeatable non-production sandbox.
  core_rule: >-
    Core vendors must offer a persistent free managed sandbox, documented
    headless authentication, and at least one DAEB-1 benchmark surface
    (API or CLI). Product strata are selected for architectural diversity;
    task outcomes are never used to choose vendors.
  research_rule: >-
    Research vendors represent an important database stratum but do not align
    with the current API/CLI execution contract strongly enough for headline
    ranking. They remain visible in methodology work without affecting core
    task selection or production runs.
  exclusion_rule: >-
    Exclude products without a persistent free managed sandbox or without
    documented headless access. Reconsider when eligibility changes.
entries:
