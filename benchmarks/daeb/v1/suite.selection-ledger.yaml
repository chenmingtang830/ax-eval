schema: ax.selection-ledger/v1
benchmark: SUITE
category: database
generated_at: 2026-07-09T23:40:49.481Z
methodology:
  schema: ax.suite-methodology/v1
  ontology:
    task: A single benchmark problem with fixed intent and success criteria.
    trial: One attempt at a task under a clean environment.
    grader: Logic that scores either an outcome or transcript-derived property.
    transcript: Behavior evidence from the agent run, including tool use and
      intermediate steps.
    outcome: Final world state in the environment after a trial.
    support_decision: A recorded judgment about whether a vendor/surface can perform a task.
    selection_decision: A recorded judgment about whether a concept becomes part of
      the canonical suite.
    suite: The frozen canonical task bank for a category.
    publication_bundle: The artifact bundle tying methodology, adapters, evidence,
      and results together.
  static_ax:
    label: Discoverability & Readiness
    dimensions:
      - discoverability
      - content quality
      - capability exposure
      - protocol/access readiness
    notes:
      - Discoverability & Readiness is a publication/audit layer and never
        changes usability-suite pass rates.
  behavioral:
    label: Usability Canonical Suite
    source_of_truth: Verified world state read back from the live product
    notes:
      - Usability-suite scoring is governed only by verified task outcomes on
        the suite-declared benchmark surfaces.
  extraction_requirements:
    - Use only official vendor documentation as evidence.
    - Persist every extracted capability with structured evidence objects.
    - Document supported benchmark surfaces where evidence exists; deferred
      surfaces may still be retained as research metadata.
  surface_scope:
    - api
    - cli
  min_vendor_coverage_pct: 0.75
  target_task_count: 10
  verifiability_requirement: Selected tasks must have deterministic read-back
    verification against world state.
  difficulty_rubric:
    L1: "Single action: one create/read/update/check call with minimal setup."
    L2: "Single capability with configuration or composition: ACL, vector search
      index, etc."
    L3: "Multi-step workflow within one domain: schema evolution, server-side
      routine."
    L4: "Full lifecycle or cross-cutting operational workflow: backup/restore, CDC,
      integrity constraints."
  human_review_checkpoints:
    - "bottom-up pipeline review: capability inventory → concept universe →
      coverage matrix → selection ledger → task drafts"
    - final suite freeze
    - publication bundle release
