mcp:
  server: https://mcp.supabase.com/mcp
  transport: http
  docs_url: https://supabase.com/docs/guides/ai-tools/mcp
  auth:
    kind: oauth_app
    instructions: >-
      ## OAuth 2.0 — self-onboarding

      Point your MCP client at the server URL and approve access in the browser.
      The server supports OAuth Dynamic Client Registration (RFC 7591), so the
      client registers itself automatically — no developer-portal app,
      `client_id`, or `client_secret` to create.
