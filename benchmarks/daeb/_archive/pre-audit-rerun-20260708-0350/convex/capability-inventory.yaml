capabilities:
  - capability_name: deployment-provisioning
    title: Database Deployment Provisioning
    description: Create, inspect, update, delete, and list Convex database
      deployments within a project. Each deployment is an isolated database
      instance containing its own schema, data, and server-side functions.
    resource_kind: deployment
    operation_kind: create
    surfaces_documented:
      - api
    support_type: native
    evidence:
      - doc_url: https://docs.convex.dev/management-api
        quote: POST /projects/{project_id}/create_deployment — Create deployment; GET
          /projects/{project_id}/list_deployments — List deployments; GET
          /deployments/{deployment_name} — Get deployment; PATCH
          /deployments/{deployment_name} — Update deployment; POST
          /deployments/{deployment_name}/delete — Delete deployment
        note: "Also: GET /projects/{project_id}/deployment and GET
          /teams/{team_id_or_slug}/projects/{project_slug}/deployment for
          slug-based lookup"
    extraction_provenance:
      source: official-docs
      extracted_at: 2026-07-08T00:00:00.000Z
      extractor: llm-capability-inventory-v1
