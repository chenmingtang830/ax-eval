      transactions on non-overlapping data proceed without conflict; overlapping
      transactions cause a retryable conflict error on the second writer."
    resource_kind: row
    operation_kind: create
    surfaces_documented:
      - sdk
      - cli
    support_type: native
    evidence:
      - doc_url: https://docs.turso.tech/tursodb/concurrent-writes
        quote: Transactions that write to non-overlapping data proceed without conflict
      - doc_url: https://docs.turso.tech/sql-reference/statements/transactions
        quote: BEGIN CONCURRENT enables optimistic concurrent writes using snapshot
          isolation. Multiple connections can write simultaneously; conflicts
